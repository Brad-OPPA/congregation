# 9개 시간 마커 자동 계산 (학생 과제 합산: 3 + 5 + 4 = 12분 + 조언 3분 = 15분)
# 수원 연무 회중 7:30 pm 시작 기준
# ─────────────────────────────────────────────────────────────
time_markers:
  marker_1_intro: "By 7:35 pm"           # 소개말 시작 (5분 전 = 시작노래·기도)
  marker_2_subject: "By 7:36 pm"         # 주제 소개 (1분)
  marker_3_treasures_talk: "By 7:46 pm"  # 10분 연설 종료
  marker_4_spiritual_gems: "By 7:56 pm"  # 영적 보물 찾기 종료
  marker_5_bible_reading: "By 8:00 pm"   # 성경 낭독 + 조언 종료 (4분)
  marker_6_field_intro: "By 8:01 pm"     # 야외 봉사 진입
  marker_7_field_end: "By 8:16 pm"       # 학생 과제 3건 + 조언 (3+5+4=12분 + 조언 3분 = 15분 → 8:01+15=8:16)
  marker_8_living: "By 8:20 pm"          # 중간 노래 후 그리스도인 생활 진입 (8:16+4=8:20)
  marker_8b_living_end: "By 8:35 pm"     # 생활 파트 15분 → 8:20+15=8:35
  marker_9_cbs: "By 9:05 pm"             # CBS 30분 종료
  marker_10_review: "By 9:08 pm"         # 복습·발표·다음주·임명 3분
  # 광고 + 마치는 노래 + 마침 기도 ~ 9:15 pm

time_calc_notes: |
  학생 과제 시간 합산:
    apply_1 (대화 시작하기, 3분) + apply_2 (우리의 신앙 설명하기, 5분) + apply_3 (제자가 되도록 돕기, 4분) = 12분
    + 학생 조언 각 1분씩 3건 = 3분
    + 진입 멘트 1분 = 16분
    8:00 pm + 16분 = 8:16 pm (야외 봉사 종료)
  생활 파트 15분이므로 8:20 + 15 = 8:35 pm
  CBS 30분 = 8:35 + 30 = 9:05 pm

# ─────────────────────────────────────────────────────────────
# ① Planner 단계 — 보조 에이전트 지시서 (6단 방어 ① 키)
# 두 개의 prayer-composer 호출에 대한 자연어 지시
# ─────────────────────────────────────────────────────────────
instructions_to_subresearchers:
  prayer-composer-opening: |
    당신은 prayer-composer 에이전트입니다. 본 호출은 chair-script-builder 의
    ② 단계 (보조 에이전트 자체 검수 단계 포함) 작업입니다. 작업 완료 후
    `_selfcheck.md` 에 자체 검수 결과를 남기세요.

    [입력 파라미터]
    meeting_type: midweek
    prayer_type: opening
    meeting_date: 2026-04-30
    week_subject: "이사야 56장 — 여호와를 하느님으로 둔 우리는 행복합니다"
    bible_reading_range: "사 56:4-12"
    key_points:
      - 10분 연설: "여호와를 하느님으로 둔 우리는 행복합니다" — 여호와를 자신의 하느님으로 모실 때 누리는 참된 행복
      - 영적 보물 찾기: 사 56:6, 7 의 예언이 오늘날 어떻게 성취되고 있는지 — 이방인·외국인도 여호와의 집에서 환영받는 영적 성취
      - 그리스도인 생활: "여호와에 대해 말하기를 결코 중단하지 마십시오" — 어떤 상황에서도 증거하는 자세
      - CBS: 「하느님께 가까이 가십시오」 80-81장 — 여호와의 속성과 우리의 가까운 관계
    related_bible_person: 이사야 (또는 sub-agent 판단으로 자연스러운 다른 인물 가능)
    prayer_by: "(미정 — chair-script-builder 가 사용자 입력 후 치환)"
    avoid_metaphors: []  # 없음 (본 집회 첫 호출이므로)
    avoid_jesus_epithets: []  # 없음

    [지시 사항]
    - 시작 기도이므로 집회 도입에 어울리는 4단 구조 (도입 인사 → 한 주 영적 양식에 대한 감사·요청 →
      각 파트별 통찰 구하기 → 마무리·예수의 이름으로) 로 작성
    - 여호와를 하느님으로 모시는 행복(10분 연설 주제)을 짧게 반영
    - 신선한 비유 1개 사용 (예: 영적 양식·등불·길잡이 류 진부한 비유 회피)
    - 이전 주 research-prayer 폴더의 비유·수식어와 중복 회피 (같은 폴더 Read 후)
    - 신세계역 표기 엄수, 추측·창작 금지

    [할루시네이션 금지 헌장]
    - 훈련 데이터 기억으로 성구·출판물 인용 금지. wol.jw.org 에서 확인된 본문만 사용.
    - 인용 시 출처 URL 명시. 확인 못 한 항목은 [확인 필요] placeholder.
    - verbatim 인용은 짧게, 출처 함께.

    [산출물]
    - 저장 경로: /mnt/c/Users/yoone/Dropbox/ClaudeFile/Congregation/research-prayer/260430_midweek_opening.md
    - 같은 폴더 _selfcheck.md 에 자체 검수 (사용 비유·수식어 명시 — chair-script-builder 가
      ③ 재검수 + ⑤ 단계에서 마침 기도 호출 시 avoid 리스트로 전달)

  prayer-composer-closing: |
    당신은 prayer-composer 에이전트입니다. 본 호출은 chair-script-builder 의
    ② 단계 작업입니다. 작업 완료 후 `_selfcheck.md` 에 결과 남기세요.

    [입력 파라미터]
    meeting_type: midweek
    prayer_type: closing
    meeting_date: 2026-04-30
    week_subject: "이사야 56장 — 여호와를 하느님으로 둔 우리는 행복합니다"
    bible_reading_range: "사 56:4-12"
    key_points: (opening 과 동일 4개)
    related_bible_person: (opening 과 다른 인물 권장 — 자연스러움 우선)
    prayer_by: "(미정 — chair-script-builder 가 사용자 입력 후 치환)"
    avoid_metaphors:
      - "[chair-script-builder 가 ③ 단계에서 opening _selfcheck.md 의 used_metaphors 를 자동 추출해 채움]"
    avoid_jesus_epithets:
      - "[chair-script-builder 가 ③ 단계에서 opening _selfcheck.md 의 used_jesus_epithets 를 자동 추출해 채움]"

    [지시 사항]
    - 마침 기도이므로 4단 구조 (집회에서 받은 영적 양식 회상 → 결심 표현 →
      청중 보호·복지 간구 → 마무리·예수의 이름으로) 로 작성
    - opening 기도와 비유·수식어 중복 절대 금지 (avoid_* 명시 활용)
    - 본 집회의 모든 파트(10분 연설·영보·학생 과제 3건·생활·CBS) 에서 받은 영적 통찰을
      두루 회상하되 한 파트만 길게 다루지 말 것

    [할루시네이션 금지 헌장]
    - opening 호출과 동일.

    [산출물]
    - 저장 경로: /mnt/c/Users/yoone/Dropbox/ClaudeFile/Congregation/research-prayer/260430_midweek_closing.md
    - 같은 폴더 _selfcheck.md 에 자체 검수

