# layout_patterns — 4주치 샘플 (231213/250718/251031/260311) 직접 분석
# 정책 정본: .claude/shared/markup-and-layout-policy.md §K-2
# 분석일: 2026-04-25
# ─────────────────────────────────────────────────────────────
layout_patterns:
  body_size_pt: 13
  direction_size_pt: 8                     # < 무대 지시 > 회색 8pt (4주 모두 일관)
  inline_quote_size_pt: 12                 # 성구·요점 verbatim 인용 12pt (선택)
  time_marker_color: "FF0000"
  time_marker_size_pt: 13
  time_markers_standard:
    - "7:35"
    - "7:36"
    - "7:46"
    - "7:56"
    - "8:00"
    - "8:01"
    - "8:16"
    - "8:20"
    - "8:35"
    - "9:05"
    - "9:08"
  time_markers_sub:                        # 학생 과제 사이 보조 마커 — 자동 들여쓰기
    - "8:04"
    - "8:05"
    - "8:09"
    - "8:10"
  indent_emu_standard: 508000              # 인용·실연·성구 verbatim·보조 시간 마커
  yellow_highlight_targets:
