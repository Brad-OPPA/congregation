    우선 검색: 「파수대」 2018-2025 연구용, 「전도 학교」 책 해당 원칙.
    보조: 행누 19과 4 동영상 "성경 진리를 찾아내다" 내용 요약 (찰스 러셀 성경 연구 배경).
    (피하기: 외국어판 인용, 찰스 러셀 비판 콘텐츠)
  illustration-finder: |
    성경 연구 진행 장면에 녹일 비유·관찰 1~2개.
    핵심: 교사가 말을 줄이고 학생이 스스로 발견하도록 돕는 예시 (교육학·일상).
