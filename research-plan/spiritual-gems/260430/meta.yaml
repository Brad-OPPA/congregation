instructions_to_subresearchers:
  scripture-deep: |
    이 주차 핵심 성구: 사 56:6-7 (공식 질문 1), 사 57:15 (보물 나누기 보강 후보).
    중점 — 사 56:6의 "계약을 굳게 지키는"의 히브리어 원의 및 신약 성취(요 10:16, 엡 2:12-14),
    사 57:15의 "영이 꺾이고 낮은 자들"의 히브리어 표현 및 시편 51:17과의 연결.
    연구 노트·상호 참조 포함. 이사야 56-57장 범위 내 성구 중심 조사.
    피하기: 범위 외 다른 이사야 장(1-55, 58-66)의 성구 독립 확장 금지.
  publication-cross-ref: |
    주제 키워드: '다른 양', '외국인의 참 숭배', '모든 민족을 위한 기도하는 집', '낮은 자를 되살리심'.
    우선 검색 범위: 「파수대」 연구용 2007년 1/15 10면 3항, 2006년 11/1 27면 1항.
    보조 검색: 「통찰」 제1권 "외국인", "계약" 항목.
    각 출판물 3~5개 단락이면 충분. 피하기: 외국어판 인용 금지, 사 56:6, 7 직접 인용 외 성구 과잉 확장.
  illustration-finder: |
    이 파트(dig-treasures)는 서론 외부 후크 N·A (차등 적용표 규칙).
    대신 §4 대비 답변 5개에 사용할 간단한 "연결 이미지" 후보만 수집:
    - 사 56:8 (또 다른 사람들 모음) → 전도 활동 관련 wol 공식 사진
    - 사 57:15 (낮은 자와 함께 계심) → wol 위로 장면 공식 사진
    삽화 상한 N·A. 종교적 이미지는 wol 전용 원칙 유지. 피하기: 외부 종교화·도상 절대 금지.
  experience-collector: |
    주제: '다른 민족 배경을 가진 형제자매의 회중 환영 경험' 또는 '어려움 중 여호와께 도피하여 회복된 경험'.
    연감·파수대·JW 방송 2015년 이후. 실명 공개된 아동 포함 경험담 피하기.
    dig-treasures는 10분 파트로 경험담 실제 사용 가능성은 낮음 — 사회자 당일 언급용 후보만 수집.
  application-builder: |
    4축 (가정·직장/학교·회중·개인 영성) 중 특히 '회중'과 '개인 영성' 포커스.
    사 56:6, 7 관련: "출신 배경 무관하게 따뜻이 맞아들이는 회중 분위기 만들기"
    사 57:15 관련: "낙심·억눌림 중에 여호와께 나아가는 구체적 방법"
    자기점검 질문 1~2개. 피하기: 정치·국가 관련 예시, 특정 문화권 비교 예시.

