scripture_reads:
  - ref: "사 56:6"
    read_aloud: true
    text_verbatim: "여호와와 함께하여 그를 섬기고 여호와의 이름을 사랑하며 그의 종이 되려고 하는 외국인들, 안식일을 지키고 그날을 더럽히지 않는 이들, 나의 계약을 굳게 지키는 모든 이들,"
  - ref: "사 56:7"
    read_aloud: true
    text_verbatim: "그들을 내가 나의 거룩한 산으로 데리고 가서 나의 기도하는 집 안에서 기쁘게 해 주겠다. 그들의 번제물과 희생 제물은 나의 제단 위에서 기꺼이 받아들여질 것이다. 내 집은 모든 민족이 기도하는 집이라고 불릴 것이다."
  - ref: "사 57:15"
    read_aloud: false
    note: "청중 보물 나누기 보강 시 선택 사용"
    text_verbatim: "높고도 높으신 분, 영원히 사시며 그 이름이 거룩한 분이 이렇게 말씀하신다. '나는 높고 거룩한 곳에 거하지만, 낮은 자들의 영을 되살리고 억눌린 자들의 마음을 되살리기 위해, 영이 꺾이고 낮은 자들과 함께 있다.'"

