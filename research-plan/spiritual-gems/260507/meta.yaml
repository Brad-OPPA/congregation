official_questions:
  - number: 1
    text: "사 59:11—이스라엘 백성은 어떤 의미에서 '곰처럼 으르렁'거렸습니까?"
    scripture_read: "이사야 59:11"
    references:
      - "「통찰」-1권 '곰' 6항"
    reference_urls:
      - "https://wol.jw.org/ko/wol/d/r8/lp-ko/1200000589"
    target_seconds: 240
    expected_answers_outline:
      - "배가 고픈 곰이 먹이를 보고도 먹지 못해 분노·좌절을 표현하는 으르렁"
      - "이스라엘이 공의·구원을 갈망했지만 거듭 실망 → 분노 섞인 좌절"
      - "비둘기의 슬피 욺 = 동일 상황의 다른 정서 (분노+슬픔)"
      - "좌절의 진짜 원인 = 여호와의 무능 X / 자신들의 죄 (사 59:1, 2)"

  - number: 2
    text: "이번 주 성경 읽기를 통해 어떤 영적 보물을 발견했습니까?"
    scripture_read: "이사야 58:6, 7 (사회자 우선 시연용)"
    references: []
    reference_urls: []
    target_seconds: 240
    expected_answers_outline:
      - "사 58:6, 7 — 참된 단식 = 약자에 대한 실질적 도움"
      - "사 58:13, 14 — 안식일 = 영적 일에 몰입할 때 더없는 기쁨"
      - "사 59:1 — 여호와의 손은 짧지 않다 (위로의 핵심)"
      - "사 59:16, 17 — 사람이 없으니 여호와의 팔이 직접 구원 (그리스도 예표·엡 6:14, 17 원조)"

