selected_gems:
  # 사 58장 (8개)
  - gem_id: 1
    chapter_verse: "사 58:1"
    nwt_verbatim: "목청껏 외쳐라! 주저하지 마라! 뿔나팔처럼 네 목소리를 높여라. 내 백성에게 그들의 거역 행위를, 야곱의 집에 그들의 죄를 알려라."
    selection_reason: "예언자의 책무 — 죄에 대해 분명히 말하는 것이 사랑"
    insight_categories: ["예언자 직무", "사랑의 책망"]

  - gem_id: 2
    chapter_verse: "사 58:2"
    nwt_verbatim: "그들은 마치 의를 행하고 자기 하느님의 공의를 저버리지 않은 민족인 것처럼, 날마다 나를 찾으며 나의 길에 관해 알기를 좋아한다. 그들은 의로운 판단을 위해 나에게 물으며 하느님에게 가까이 가기를 좋아한다."
    selection_reason: "외형적 경건의 위험 — '의를 행하는 것처럼 보이며'"
    insight_categories: ["위선", "마음의 진실성"]

  - gem_id: 3
    chapter_verse: "사 58:3, 4"
    nwt_verbatim: "'우리가 단식하는데 왜 보아 주지 않으십니까? 우리가 스스로를 괴롭히는데 왜 알아주지 않으십니까?' 너희는 단식하는 날에도 자기 이익만 구하고, 너희의 일꾼들을 압제하기 때문이다. 너희 단식은 다툼과 싸움으로 끝나며, 너희는 악한 주먹으로 친다."
    selection_reason: "종교 의식이 부도덕한 일상을 정당화 못함 — 행동의 일관성"
    insight_categories: ["일관성", "종교와 정의"]

  - gem_id: 4
    chapter_verse: "사 58:5"
    nwt_verbatim: "내가 택하는 단식이 이런 것이겠느냐? 단지 사람이 스스로를 괴롭히는 날이겠느냐? 머리를 골풀처럼 숙이고, 자루천과 재 위에 자리를 깔고 눕는 것이겠느냐?"
    selection_reason: "외형 절제 ≠ 여호와가 기뻐하시는 것 — 형식주의 비판"
    insight_categories: ["형식주의", "마음의 종교"]

  - gem_id: 5
    chapter_verse: "사 58:6, 7"
    nwt_verbatim: "아니다. 내가 택하는 단식은 이런 것이다. 악한 족쇄를 풀어 주고, 멍에대의 줄을 끌러 주고, 압제받는 자들을 자유롭게 내보내고, 모든 멍에대를 꺾는 것이다. 굶주린 사람에게 네 빵을 나누어 주고, 가난하고 집 없는 사람을 네 집에 맞아들이고, 헐벗은 사람을 보면 옷을 입혀 주고, 네 혈육을 못 본 체하지 않는 것이다."
    selection_reason: "참된 종교의 정의 — 약자 환대·해방·실질적 도움 (눅 4:18 그리스도 임무 선포의 원조)"
    insight_categories: ["참된 종교", "환대", "그리스도 임무"]

  - gem_id: 6
    chapter_verse: "사 58:8"
    nwt_verbatim: "그렇게 하면 네 빛이 새벽빛처럼 비치고, 네가 신속히 낫게 될 것이다. 네 의가 네 앞에 가고 여호와의 영광이 네 뒤를 지켜 줄 것이다."
    selection_reason: "후대 실천이 빛·치유로 보상됨 — 이타적 행동의 영적 보상"
    insight_categories: ["보상", "영적 치유"]

  - gem_id: 7
    chapter_verse: "사 58:9"
    nwt_verbatim: "그때에 네가 부르면 여호와가 대답하고, 네가 도와 달라고 부르짖으면 '내가 여기 있다!' 하고 말할 것이다. 네가 네 가운데에서 멍에대를 없애고 손가락질과 악한 말을 그치면,"
    selection_reason: "기도 응답의 조건 — 험담·손가락질 끊기"
    insight_categories: ["기도 응답", "험담 끊기"]

  - gem_id: 8
    chapter_verse: "사 58:11"
    nwt_verbatim: "여호와가 너를 늘 인도하고, 메마른 땅에서도 너를 만족시켜 주며, 네 뼈에 힘을 줄 것이다. 너는 물이 넉넉한 동산처럼, 물이 끊이지 않는 샘처럼 될 것이다."
    selection_reason: "영적 회복력 — '물이 끊이지 않는 샘'"
    insight_categories: ["영적 활력", "여호와 인도"]

  - gem_id: 9
    chapter_verse: "사 58:12"
    nwt_verbatim: "너 때문에 사람들이 오래된 폐허들을 재건할 것이며, 너는 대대로 버려져 있던 기초를 다시 놓을 것이다. 너는 허물어진 성벽을 보수하는 이, 사람이 살도록 거리를 복구하는 이라고 불릴 것이다."
    selection_reason: "파괴 후 재건의 약속 — 영적 회복·세대 회복"
    insight_categories: ["회복", "재건자 정체성"]

  - gem_id: 10
    chapter_verse: "사 58:13, 14"
    nwt_verbatim: "네가 안식일을 지켜서 나의 거룩한 날에 네 이익을 구하지 않고, 안식일을 더없는 기쁨이라 부르고, 여호와의 거룩한 날을 영광스러운 날이라 부르며, 네 이익을 구하지도, 수다를 떨지도 않고 그날을 영광스럽게 한다면, 너는 여호와 안에서 더없는 기쁨을 얻을 것이며, 나는 네가 땅의 높은 곳을 타고 다니게 하고 네 조상 야곱의 상속 재산으로 먹게 해 주겠다."
    selection_reason: "안식일 = 더없는 기쁨 — 영적 일 우선 배치가 행복 비결"
    insight_categories: ["안식일 원리", "시간 우선순위"]

  # 사 59장 (10개)
  - gem_id: 11
    chapter_verse: "사 59:1"
    nwt_verbatim: "보라! 여호와의 손이 너무 짧아 구원하지 못하시는 것도 아니고, 그분의 귀가 너무 어두워 듣지 못하시는 것도 아니다."
    selection_reason: "표어 성구 — 응답 지연 책임 = 여호와에게 있지 않음"
    insight_categories: ["여호와 능력", "신학적 위로"]

  - gem_id: 12
    chapter_verse: "사 59:2"
    nwt_verbatim: "오히려 너희의 잘못이 너희와 너희 하느님 사이를 갈라놓았고, 너희의 죄 때문에 그분이 너희에게서 얼굴을 감추시어 너희의 말을 듣지 않으시는 것이다."
    selection_reason: "죄가 기도의 진짜 장애물 — 자기 점검의 신학적 근거"
    insight_categories: ["죄와 기도", "자기 점검"]

  - gem_id: 13
    chapter_verse: "사 59:4"
    nwt_verbatim: "의를 위해 부르짖는 자가 없고 진실되게 법정에 서는 자도 없다. 그들은 헛된 것을 신뢰하고 무가치한 것을 말하며, 고통을 잉태하고 해로운 것을 낳는다."
    selection_reason: "거짓에 의지하는 사회의 자가 파괴"
    insight_categories: ["거짓 신뢰", "사회 도덕"]

  - gem_id: 14
    chapter_verse: "사 59:7, 8"
    nwt_verbatim: "그들의 발은 악한 일을 하려고 달려가고 무고한 피를 흘리려고 서두른다. 그들의 생각은 해로운 생각뿐이고 그들의 길에는 파멸과 비참함이 있다. 그들은 평화의 길을 알지 못하고 그들의 길에는 공의가 없다. 그들은 자기들이 다니는 길을 구부러지게 하니, 그 길로 걷는 자는 아무도 평화를 알지 못할 것이다."
    selection_reason: "롬 3:15-17 직접 인용원 — 신약 인용원 인식"
    insight_categories: ["신약 인용원", "보편적 죄성"]

  - gem_id: 15
    chapter_verse: "사 59:9, 10"
    nwt_verbatim: "그러므로 공의는 우리에게서 멀리 있고, 의는 우리에게 미치지 못합니다. 우리가 빛을 바라지만 어둠뿐이며, 밝음을 바라지만 캄캄함 가운데 걸을 뿐입니다. 우리는 눈먼 사람처럼 담을 더듬고, 눈이 없는 이들처럼 더듬고 다닙니다. 대낮에도 어두운 저녁 때처럼 걸려 넘어지니, 강한 자들 가운데 있어도 죽은 자나 마찬가지입니다."
    selection_reason: "죄의 결과 = 영적 시각 상실 — 죄와 분별력 관계"
    insight_categories: ["영적 분별", "죄의 결과"]

  - gem_id: 16
    chapter_verse: "사 59:11"
    nwt_verbatim: "우리가 모두 곰처럼 으르렁거리고 비둘기처럼 슬피 울고 있습니다. 우리가 공의를 바라지만 공의가 없고, 구원을 바라지만 구원이 우리에게서 멀리 있습니다."
    selection_reason: "★ 공식 질문 1 핵심 본문 — 통-1 '곰' 6항 결합"
    insight_categories: ["동물 비유", "공식 질문 1", "자기 점검"]

  - gem_id: 17
    chapter_verse: "사 59:12, 13"
    nwt_verbatim: "우리의 거역 행위가 당신 앞에 많고, 우리의 죄가 저마다 우리에게 불리한 증언을 합니다. 우리의 거역 행위가 우리와 함께 있고, 우리의 잘못을 우리가 잘 압니다. 우리가 범법 행위를 하고 여호와를 부인했으며, 우리 하느님께 등을 돌렸습니다."
    selection_reason: "진정한 회개의 출발 = 정직한 자백"
    insight_categories: ["회개", "자백"]

  - gem_id: 18
    chapter_verse: "사 59:14, 15"
    nwt_verbatim: "공의는 뒤로 밀려나고 의는 멀리 서 있습니다. 진실은 광장에서 걸려 넘어지고 올바른 것은 들어오지 못합니다. 진실은 사라졌고 악에서 떠나는 이는 약탈을 당합니다. 여호와께서 보시고 불쾌하게 여기셨으니, 공의가 없기 때문이다."
    selection_reason: "사회 도덕 붕괴의 묘사 — 오늘 시대 거울"
    insight_categories: ["시대 분별", "도덕 붕괴"]

  - gem_id: 19
    chapter_verse: "사 59:16, 17"
    nwt_verbatim: "그분은 나서는 사람이 없는 것을 보시고, 아무도 중재하지 않는 것을 보시고 몹시 놀라셨다. 그래서 그분의 팔이 구원을 가져오고, 그분의 의가 그분을 거들었다. 그리하여 그분은 의를 비늘 갑옷처럼 입으시고 구원의 투구를 머리에 쓰셨다. 복수의 옷을 입으시고 열심을 겉옷처럼 두르셨다."
    selection_reason: "★ 그리스도 예표 + 엡 6:14, 17 영적 무장의 원조"
    insight_categories: ["그리스도 예표", "영적 무장", "신적 중재"]

  - gem_id: 20
    chapter_verse: "사 59:21"
    nwt_verbatim: "내가 그들과 맺은 나의 계약은 이러하다. 여호와께서 말씀하신다. 네 위에 있는 나의 영과 내가 네 입에 넣어 준 나의 말은 지금부터 영원히 네 입과 네 자녀의 입과 네 손자녀의 입에서 떠나지 않을 것이다. 여호와께서 말씀하신다."
    selection_reason: "진리의 세대 계승 약속 — 가정 가르침의 영원성"
    insight_categories: ["계약", "세대 계승"]

