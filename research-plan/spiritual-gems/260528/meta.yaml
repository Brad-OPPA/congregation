official_questions:
  - q1:
      verbatim: "사 66:24—이 구절은 마가복음 9:47, 48에 나오는 게헨나에 관한 예수의 말씀을 이해하는 데 어떻게 도움이 됩니까?"
      references:
        - "「통찰」 1권 \"게헨나\" 6-7항"
        - "「깨어라!」 (까) 275면 12·14항"
        - "「파수대」 2024년 4월호 22면 9-10항"
        - "「파수대」 2024년 4월호 23면 13항"
  - q2:
      verbatim: "이번 주 성경 읽기를 통해 어떤 영적 보물을 발견했습니까?"
      references: []

headline_scripture:
  ref_isa: 이사야 66:24
  text_isa: "그들은 나가서 내게 반역한 사람들의 시체를 볼 것이다. 그것들에 붙은 벌레들이 죽지 않고 그것들을 태우는 불이 꺼지지 않으리니, 그 시체들이 모든 사람에게 역겨운 것이 될 것이다."
  ref_mark: 마가복음 9:47, 48
  text_mark: "여러분의 눈이 여러분을 걸려 넘어지게 한다면 빼어 던져 버리십시오. 한 눈으로 하느님의 왕국에 들어가는 것이, 두 눈을 가지고 게헨나에 던져지는 것보다 낫습니다. 거기서는 그들의 벌레가 죽지 않고 불도 꺼지지 않습니다."

# 20성구 선정 (사 65: 12 + 사 66: 8) — 핵심 ★ 4 절
selected_gems:
  # 이사야 65장 (12개)
  - chapter_verse: "사 65:1"
    nwt_verbatim: "나는 나를 보려고 청하지 않는 자들이 나를 만나게 해 주었고, 나를 찾지 않는 자들이 나를 발견하게 해 주었다. 내 이름을 부르지 않는 나라에게 '내가 여기 있다, 내가 여기 있다!' 하고 말하였다."
    selection_reason: 여호와의 인내·이방인 부르심
    suggested_angles: [신약 성취, 평행]
    application_focus: 회중·전도

  - chapter_verse: "사 65:2"
    nwt_verbatim: "고집 센 백성에게, 자기 생각을 따라 좋지 않은 길을 걷는 자들에게 내가 온종일 팔을 벌리고 있었다."
    selection_reason: 여호와의 인내·반역 백성
    suggested_angles: [신약 성취, 일상]
    application_focus: 개인 영성

  - chapter_verse: "사 65:8"
    nwt_verbatim: "포도송이에 새 포도주가 들어 있는 것을 보고 '그 속에 좋은 것이 들어 있으니 그것을 없애지 마라' 하고 말하는 것과 같이, 나도 내 종들을 위해 그렇게 하여 그들을 모두 멸하지는 않을 것이다."
    selection_reason: 충성스러운 종 보존
    suggested_angles: [일상, 평행]
    application_focus: 개인 영성

  - chapter_verse: "사 65:9"
    nwt_verbatim: "나는 야곱에게서 자손이 나오게 하고 유다에게서 내 산들을 상속받을 자가 나오게 할 것이다. 내가 선택한 자들이 그것을 차지하고 나의 종들이 거기에 거할 것이다."
    selection_reason: 선택받은 자 상속
    suggested_angles: [신약 성취, 평행]
    application_focus: 회중

  - chapter_verse: "사 65:13"
    nwt_verbatim: "보라! 나의 종들은 먹겠지만 너희는 굶주릴 것이다. 보라! 나의 종들은 마시겠지만 너희는 목마를 것이다. 보라! 나의 종들은 기뻐하겠지만 너희는 수치를 당할 것이다."
    selection_reason: 종 vs 반역자 대조
    suggested_angles: [평행, 일상]
    application_focus: 개인 영성

  - chapter_verse: "사 65:16"
    nwt_verbatim: "그리하여 땅에서 자신을 위해 축복을 구하는 사람은 진리의 하느님에게 축복을 받고, 땅에서 맹세하는 사람은 진리의 하느님을 두고 맹세할 것이다. 이전의 고난은 잊혀지고 내 눈앞에서 사라질 것이기 때문이다."
    selection_reason: 진리의 하느님·고난 잊혀짐
    suggested_angles: [어원 (아멘·진리), 신약 성취]
    application_focus: 개인 영성

  - chapter_verse: "사 65:17"
    nwt_verbatim: "보라! 내가 새 하늘과 새 땅을 창조한다. 이전 것들은 기억되지도 않고 마음에 떠오르지도 않을 것이다."
    selection_reason: ★ 새 하늘·새 땅 약속 (벧후 3:13·계 21:1 평행)
    suggested_angles: [신약 성취, 평행, 교리]
    application_focus: 개인 영성

  - chapter_verse: "사 65:18"
    nwt_verbatim: "그러니 너희는 내가 창조하는 것으로 인해 영원히 환희에 넘쳐 기뻐하여라. 보라! 내가 예루살렘을 기쁨의 근원으로, 그 백성을 환희의 근원으로 창조할 것이다."
    selection_reason: 예루살렘 환희
    suggested_angles: [신약 성취, 평행]
    application_focus: 회중

  - chapter_verse: "사 65:20"
    nwt_verbatim: "그곳에는 며칠밖에 살지 못하는 아기도 없고 수명을 다 채우지 못하는 노인도 없을 것이다. 백 살에 죽는 자도 아이로 여겨지고 죄인은 백 살이라 해도 저주를 받게 될 것이다."
    selection_reason: 수명·죽음 없음
    suggested_angles: [신약 성취, 일상]
    application_focus: 개인 영성

  - chapter_verse: "사 65:21, 22"
    nwt_verbatim: "사람들이 집을 지어 그 안에서 살고 포도원을 만들어 그 열매를 먹을 것이다. 그들이 지은 집에 다른 사람이 살지 않고, 그들이 심은 것을 다른 사람이 먹지 않을 것이다. 내 백성의 날은 나무의 날과 같고, 내게 선택받은 자들은 그 손으로 일한 것을 한껏 누릴 것이다."
    selection_reason: 안전·노동 결실
    suggested_angles: [고고, 일상, 평행]
    application_focus: 가정

  - chapter_verse: "사 65:24"
    nwt_verbatim: "그들이 부르기도 전에 내가 대답하고, 그들이 아직 말하고 있을 때에 내가 들어 줄 것이다."
    selection_reason: ★ 부르기 전 응답 — 기도 적용
    suggested_angles: [평행, 일상]
    application_focus: 개인 영성

  - chapter_verse: "사 65:25"
    nwt_verbatim: "이리와 어린양이 함께 먹고 사자가 소처럼 짚을 먹으며 뱀이 흙을 먹이로 삼을 것이다. 나의 거룩한 산 어디에서도 서로 해치거나 파괴하는 일이 없을 것이다."
    selection_reason: 평화의 동산
    suggested_angles: [평행, 일상]
    application_focus: 회중

  # 이사야 66장 (8개)
  - chapter_verse: "사 66:1, 2"
    nwt_verbatim: "하늘은 나의 왕좌요, 땅은 나의 발판이다. 그러니 너희가 나를 위해 지을 수 있는 집이 어디 있겠으며, 내가 쉴 곳이 어디 있겠느냐? … 그러므로 겸손하고 영이 꺾인 사람, 내 말을 듣고 떠는 사람, 바로 이런 사람을 내가 눈여겨볼 것이다."
    selection_reason: 여호와의 위엄·겸손 받으심
    suggested_angles: [신약 성취 (행 7:49), 평행]
    application_focus: 개인 영성

  - chapter_verse: "사 66:5"
    nwt_verbatim: "여호와의 말씀에 떠는 자들아, 너희는 그분의 말씀을 들어라. \"너희를 미워하며 내 이름 때문에 너희를 배척하는 너희 형제들이 '여호와께서 영광스럽게 되시기를!' 하고 말하였다. 그러나 그가 나타나서 너희에게 기쁨을 주고 그들이 수치를 당하게 할 것이다.\""
    selection_reason: 박해 중 떠는 자 보호
    suggested_angles: [신약 성취, 일상]
    application_focus: 회중·전도

  - chapter_verse: "사 66:8"
    nwt_verbatim: "누가 이런 일을 들어 본 적이 있느냐? 누가 이런 일들을 본 적이 있느냐? 한 땅이 하루 만에 생겨나겠느냐? 한 나라가 순식간에 태어나겠느냐? 그러나 시온은 산고를 겪자마자 아들들을 낳았다."
    selection_reason: 시온의 빠른 회복
    suggested_angles: [신약 성취, 평행, 일상]
    application_focus: 회중

  - chapter_verse: "사 66:13"
    nwt_verbatim: "어머니가 아들을 위로하듯이, 내가 늘 너희를 위로할 것이다. 예루살렘으로 인해 너희가 위로를 받을 것이다."
    selection_reason: 여호와의 어머니다운 위로
    suggested_angles: [어원, 평행]
    application_focus: 가정

  - chapter_verse: "사 66:14"
    nwt_verbatim: "너희는 이것을 보고 마음이 기쁠 것이며, 너희 뼈는 새 풀처럼 생기가 넘칠 것이다. 여호와의 종들은 그의 손을 알게 되겠지만, 그 적들은 그에게 질책을 받을 것이다."
    selection_reason: 종의 활력·기쁨
    suggested_angles: [평행, 일상]
    application_focus: 개인 영성

  - chapter_verse: "사 66:18"
    nwt_verbatim: "나는 그들의 행위와 생각을 알고 있다. 그러므로 내가 모든 민족과 언어의 사람들을 모으러 오리니, 그들이 와서 나의 영광을 볼 것이다."
    selection_reason: ★ 모든 민족·언어 모임 — 전도 핵심
    suggested_angles: [신약 성취, 평행]
    application_focus: 회중·전도

  - chapter_verse: "사 66:22"
    nwt_verbatim: "내가 만드는 새 하늘과 새 땅이 내 앞에 항상 있을 것처럼, 너희 자손과 너희 이름도 항상 있을 것이다."
    selection_reason: 영원한 약속
    suggested_angles: [신약 성취, 평행]
    application_focus: 개인 영성

  - chapter_verse: "사 66:24"
    nwt_verbatim: "그들은 나가서 내게 반역한 사람들의 시체를 볼 것이다. 그것들에 붙은 벌레들이 죽지 않고 그것들을 태우는 불이 꺼지지 않으리니, 그 시체들이 모든 사람에게 역겨운 것이 될 것이다."
    selection_reason: ★ 게헨나·영원한 멸시 — 공식 질문 1 핵심
    suggested_angles: [고고 (한놈 골짜기), 신약 성취 (막 9:47-48), 교리]
    application_focus: 회중

