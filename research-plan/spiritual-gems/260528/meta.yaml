instructions_to_subresearchers:
  scripture-deep: |
    공유 파일 6개 Read 의무 (multi-layer-defense·intro-illustration·comment-label·gem-narrative·banned-vocabulary·dig-treasures-automation).
    🟢 착수 + 🔴 종료 _selfcheck.md 의무. 호출자 접두사 `gems_`.
    중점:
    - 20성구 NWT verbatim 검증 (위 selected_gems 와 글자 단위 일치)
    - 핵심 어원: 사 65:16 "아멘"(진리의 하느님) / 사 66:13 "어머니 위로"(라함 어근) / 사 66:24 "게헨나"(헛인놈)
    - 평행 성구 ≥5/성구: 사 65:17 ↔ 벧후 3:13·계 21:1 / 사 65:24 ↔ 단 9:21·마 6:8 / 사 66:1 ↔ 행 7:49 / 사 66:18 ↔ 계 7:9
    - 신약 성취: 게헨나 (마 5:22·막 9:47-48) — 사 66:24 직접 인용원
    피하기: 영혼 불멸 시사·다른 장 끌어오지 말 것·이모지 X.

  publication-cross-ref: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    중점:
    - 「통찰」 1권 "게헨나" 6-7항 verbatim — 공식 질문 1 핵심 (한놈 골짜기·예루살렘 쓰레기 소각)
    - 「깨어라!」 275면 12·14항 verbatim
    - 「파수대」 2024년 4월호 22면 9-10항 + 23면 13항 verbatim
    - 「통찰」 "새 하늘과 새 땅" 항목 (사 65:17)
    - 「하느님의 왕국이 통치한다!」 21장 (모든 민족 모임)
    - docid 실존 검증 (가짜 절대 금지)
    피하기: 호수·면 추정 X·외국어판 끌어오지 말 것.

  application-builder: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    중점:
    - 4축 강제 폐기 (자연스러움 우선) — 영보 주제는 회중·개인 영성 적용 자연스러움
    - 자기점검 질문 ≥10 gem 에 1개씩 — 의문문 + 노랑 강조 권고
    - 사 66:2 (겸손) / 사 65:24 (기도) / 사 66:18 (전도) 중점
    - 출판물 적용 우선
    피하기: 상투적 청중 호명 ("여러분도 …해 보신 적") 절대 금지·정죄형 X.

  experience-collector: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    핵심 5~8 성구 매칭: 사 65:17 (회복 약속 인내) / 사 65:24 (기도 응답 경험) / 사 66:13 (위로) / 사 66:18 (모든 민족 전도) / 사 66:24 (게헨나 두려움 → 회복).
    공식 경험담 verbatim 출처·호수·면 명시. 연감·파수대·"삶"·JW 방송.
    피하기: 실명 공개된 아동·verbatim 미확인 ⚠️ 플래그 명시.

  illustration-finder: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    핵심 5~8 성구: 사 66:24 (한놈 골짜기 고고학 — 14축 #6) / 사 65:25 (이리·어린양 자연 비유) / 사 66:13 (어머니 위로 어원) / 사 65:17 (새 하늘·새 땅 — 천문 14축 #2) / 사 66:18 (모든 민족 통계 — JW 240+ 나라).
    1차 자료 ≥2건 교차 (Britannica·박물관·공식 통계). 적절성 8필터 전부.
    피하기: 종교 도상 X·이모지 X·서양 종교화 X.

phase_e_v2_compliance:
  policy_files_read: [multi-layer-defense.md, intro-and-illustration-quality.md, comment-label-standard.md, gem-narrative-standard.md, banned-vocabulary.md, dig-treasures-automation.md]
  enforcement:
    - "🟢🔴 블록 의무 (모든 보조)"
    - "호출자 접두사 gems_ 일관"
    - "라벨 표준 ① 핵심·② 적용·③ 배울점 (이모지 X)"
    - "다각도 권고 (어원·평행·고고·신약 성취·일상·교리 - 키워드 매칭, 강제 X)"
    - "적용 영역 자연스러움 우선 (4축 강제 X)"
    - "할루시네이션 차단 (가짜 docid X·NWT verbatim 글자 단위·사용자 NG·의심 어휘)"
    - "메인 Claude 직접 정정 금지"

block_structure:
  - block: 도입
    duration_sec: 30
    content: "통독 범위 + 표어 성구 + 주제 1줄"
  - block: 공식 질문 1 (사 66:24 게헨나)
    duration_sec: 240
    content: "성구 낭독 + 「통」 게헨나 verbatim + 막 9:47-48 평행 + 한놈 골짜기 배경 + 적용"
  - block: 공식 질문 2 (보물 발견)
    duration_sec: 240
    content: "1순위 카드 (사 65:17 새 하늘 새 땅 또는 사 65:24 기도 응답) + 청중 자율"
