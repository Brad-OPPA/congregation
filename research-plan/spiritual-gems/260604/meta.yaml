official_questions:
  - q1:
      verbatim: "렘 2:28—여호와께서 불충실한 유대 사람들에게 하신 말씀에서 무엇을 배울 수 있습니까?"
      references:
        - "「예레」 43면 3항 (= 「예레미야의 본보기를 따라」 4장 \"믿을 수 없는 마음을 경계하십시오\" 3항)"
      ref_url: "https://wol.jw.org/ko/wol/d/r8/lp-ko/1102010143"
  - q2:
      verbatim: "이번 주 성경 읽기를 통해 어떤 영적 보물을 발견했습니까?"
      references: []

headline_scripture:
  ref_jer213: "예레미야 2:13"
  text_jer213: "‘내 백성이 두 가지 악한 일을 저질렀기 때문이다. 그들은 생명의 물의 근원인 나를 버렸고, 자기들을 위해 저수조를, 물을 담을 수 없는 터진 저수조를 팠다.’"
  ref_jer322: "예레미야 3:22"
  text_jer322: "“돌아오너라, 너희 변절한 아들들아. 내가 너희의 변절한 마음을 고쳐 줄 것이다.” “우리가 여기 있습니다! 우리가 주께 왔습니다. 오 여호와여, 주는 우리의 하느님이시기 때문입니다.”"

# 20성구 선정 (렘 1장 6 + 렘 2장 9 + 렘 3장 5) — 핵심 ★ 4 절
selected_gems:
  # 예레미야 1장 (6개)
  - chapter_verse: "렘 1:5"
    nwt_verbatim: "“내가 너를 모태에서 짓기도 전에 너를 알았고, 네가 태어나기도 전에 너를 성별하였다. 내가 너를 민족들에게 보낼 예언자로 삼았다.”"
    selection_reason: ★ 모태 선택·여호와의 예지·각 사람 사랑
    suggested_angles: [어원(야다), 평행(시 139:13-16, 갈 1:15), 신약 성취]
    application_focus: 개인 영성

  - chapter_verse: "렘 1:6"
    nwt_verbatim: "그러나 내가 말했다. “아, 주권자인 주 여호와여! 저는 아직 아이라서 말할 줄 모릅니다.”"
    selection_reason: 자격 없다는 느낌·모세·기드온 평행
    suggested_angles: [평행(출 4:10·삿 6:15), 일상]
    application_focus: 회중·전도

  - chapter_verse: "렘 1:7, 8"
    nwt_verbatim: "그러자 여호와께서 나에게 말씀하셨다. “‘저는 아직 아이입니다’라고 말하지 마라. 내가 누구에게 보내든지 너는 가야 하며, 내가 무엇을 명령하든지 너는 말해야 한다. 그들의 모습을 보고 두려워하지 마라. 내가 너와 함께 있어 너를 구해 줄 것이기 때문이다. 여호와의 말이다.”"
    selection_reason: 두려움 극복·여호와의 임재 약속 (능동형)
    suggested_angles: [평행(시 27:1·마 28:20), 일상]
    application_focus: 전도

  - chapter_verse: "렘 1:9"
    nwt_verbatim: "그러고 나서 여호와께서 손을 내밀어 나의 입에 대셨다. 여호와께서 말씀하셨다. “내가 나의 말을 너의 입에 넣어 주었다.”"
    selection_reason: 말씀 권능 부여
    suggested_angles: [평행(사 6:7·단 10:16)]
    application_focus: 전도

  - chapter_verse: "렘 1:11, 12"
    nwt_verbatim: "여호와의 말씀이 또 나에게 임했다. “예레미야야, 무엇이 보이느냐?” 내가 대답했다. “아몬드나무 가지가 보입니다.” 여호와께서 나에게 말씀하셨다. “잘 보았다. 나는 내 말을 이루기 위해 온전히 깨어 있다.”"
    selection_reason: ★ 아몬드 어원 언어 유희 (샤케드 / 쇼케드)
    suggested_angles: [어원, 자연(이스라엘 1-2월 만개)]
    application_focus: 개인 영성

  - chapter_verse: "렘 1:18, 19"
    nwt_verbatim: "“오늘 내가 너를 요새 도시와 철 기둥과 구리 성벽으로 만들어 온 땅에 맞서게 하고, 유다의 왕들과 그 방백들에게, 그 제사장들과 그 땅의 백성에게 맞서게 하였다. 그들이 분명 너와 싸우겠지만, 너를 이기지 못할 것이다. 내가 너와 함께 있어 너를 구해 줄 것이기 때문이다. 여호와의 말이다.”"
    selection_reason: 보호 약속·요새·기둥·성벽 3중 비유
    suggested_angles: [평행(시 18:2·롬 8:31), 고고]
    application_focus: 회중

  # 예레미야 2장 (9개)
  - chapter_verse: "렘 2:2"
    nwt_verbatim: "“가서 예루살렘의 귀에 외쳐라. ‘여호와가 이렇게 말한다. “나는 네가 젊은 시절에 보인 정성을, 네가 약혼 시절에 나타낸 사랑을, 광야에서, 씨 뿌리지 못하는 땅에서 나를 따랐던 것을 잘 기억하고 있다.”’”"
    selection_reason: 첫 사랑·여호와의 따뜻한 회상
    suggested_angles: [평행(계 2:4 에베소 첫 사랑), 일상]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:5"
    nwt_verbatim: "여호와께서 말씀하신다. “너희의 조상이 나에게서 무슨 허물을 발견했기에 내게서 그토록 멀리 떠나, 무가치한 우상들을 따라 걷다가 그들 자신도 무가치한 자가 되었느냐?”"
    selection_reason: ★ 우상을 따르는 자가 우상처럼 무가치해진다 — 본질 변화 원칙
    suggested_angles: [평행(시 115:8·요일 5:21), 교리]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:11"
    nwt_verbatim: "어느 민족이 자기의 신들을 신이 아닌 것들과 바꾼 적이 있느냐? 그런데 내 백성은 나의 영광을 쓸모없는 것과 바꾸었다."
    selection_reason: 역사 도전 — 이방 민족도 자기 신은 안 바꾼다
    suggested_angles: [고고(이집트·앗수르 다신교 천 년 유지), 일상]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:13"
    nwt_verbatim: "‘내 백성이 두 가지 악한 일을 저질렀기 때문이다. 그들은 생명의 물의 근원인 나를 버렸고, 자기들을 위해 저수조를, 물을 담을 수 없는 터진 저수조를 팠다.’"
    selection_reason: ★ 표어 성구 — 두 가지 악 (포기·대체)
    suggested_angles: [어원(보르 = 저수조), 고고(가나안 회벽 저수조), 평행(요 4:14)]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:18"
    nwt_verbatim: "그런데 네가 어찌하여 시홀의 물을 마시려고 이집트로 향하는 길로 가고 싶어 하느냐? 어찌하여 ‘강’의 물을 마시려고 아시리아로 향하는 길로 가고 싶어 하느냐?"
    selection_reason: 동맹 외교의 헛됨 — 시홀(나일)·강(유프라테스)
    suggested_angles: [고고(이집트·아시리아 동맹 시도), 평행(사 30:1-2)]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:19"
    nwt_verbatim: "네 악이 너를 시정하고 네 불충실함이 너를 책망해야 마땅하다. 너의 하느님 여호와를 버린 것이 얼마나 악하고 쓰라린 것인지 알고 또 깨달아라."
    selection_reason: 자초한 결과·자기 책임
    suggested_angles: [평행(잠 1:31·갈 6:7), 일상]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:21"
    nwt_verbatim: "“나는 너를 아주 좋은 붉은 포도나무로, 순수한 종자로 심었다. 그런데 어찌하여 너는 내 앞에서 이방 포도나무의 질 나쁜 가지로 바뀌었느냐?”"
    selection_reason: 포도나무 변질 — 좋은 종자에서 나쁜 가지로
    suggested_angles: [평행(사 5:1-2·요 15:1-5), 자연(접목 농법)]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:22"
    nwt_verbatim: "‘네가 소다로 씻고 잿물을 많이 쓰더라도, 너의 죄는 여전히 내 앞에 얼룩으로 남아 있을 것이다.’ 주권자인 주 여호와의 말이다."
    selection_reason: 인간 정화의 한계
    suggested_angles: [평행(시 51:2-7·히 9:14), 자연(고대 화학)]
    application_focus: 개인 영성

  - chapter_verse: "렘 2:32"
    nwt_verbatim: "처녀가 자기의 장신구를, 신부가 자기의 가슴띠를 잊을 수 있겠느냐? 그런데 내 백성은 아주 오랜 세월 동안 나를 잊고 지냈다."
    selection_reason: 잊을 수 없는 것을 잊은 백성
    suggested_angles: [평행(시 137:5-6), 일상]
    application_focus: 개인 영성

  # 예레미야 3장 (5개)
  - chapter_verse: "렘 3:1"
    nwt_verbatim: "사람들은 이렇게 말한다. “어떤 남자가 자기 아내를 내보내서 그 여자가 그를 떠나 다른 남자의 아내가 된다면, 그가 그 여자를 다시 받아들일 수 있겠느냐?” 그 땅이 아주 더럽혀진 것이 아니냐?"
    selection_reason: 율법 한계 vs 여호와의 은혜
    suggested_angles: [평행(신 24:1-4·호 3:1)]
    application_focus: 회중

  - chapter_verse: "렘 3:12"
    nwt_verbatim: "가서 북쪽을 향해 이 말을 선포하여라. ‘“돌아오너라, 변절한 이스라엘아.” 여호와의 말이다.’ ‘“내가 노를 품고 너희를 내려다보지 않을 것이다. 나는 충성스럽기 때문이다.” 여호와의 말이다.’"
    selection_reason: 충성스러움·돌아오라는 부르심
    suggested_angles: [어원(헤세드), 평행(시 86:5)]
    application_focus: 회중

  - chapter_verse: "렘 3:15"
    nwt_verbatim: "“그리고 내가 내 마음에 드는 목자들을 너희에게 주리니, 그들이 지식과 통찰력으로 너희를 먹일 것이다.”"
    selection_reason: 마음에 드는 목자 — 장로 양육
    suggested_angles: [평행(엡 4:11-13), 신약]
    application_focus: 회중

  - chapter_verse: "렘 3:17"
    nwt_verbatim: "“그때에 사람들은 예루살렘을 여호와의 왕좌라고 부를 것이다. 모든 민족이 여호와의 이름을 위해 예루살렘에 모이겠고, 다시는 자기들의 악한 마음을 고집스럽게 따르지 않을 것이다.”"
    selection_reason: ★ 모든 민족 모임 — 전도 핵심
    suggested_angles: [신약(계 21:24·사 2:2-4), 평행]
    application_focus: 회중·전도

  - chapter_verse: "렘 3:22"
    nwt_verbatim: "“돌아오너라, 너희 변절한 아들들아. 내가 너희의 변절한 마음을 고쳐 줄 것이다.” “우리가 여기 있습니다! 우리가 주께 왔습니다. 오 여호와여, 주는 우리의 하느님이시기 때문입니다.”"
    selection_reason: ★ 회복 핵심 — 마음을 고쳐 주시는 여호와
    suggested_angles: [어원(슈브), 평행(호 14:4), 교리]
    application_focus: 개인 영성

