instructions_to_subresearchers:
  scripture-deep: |
    공유 파일 6개 Read 의무 (multi-layer-defense·intro-illustration·comment-label·gem-narrative·banned-vocabulary·dig-treasures-automation).
    🟢 착수 + 🔴 종료 _selfcheck.md 의무. 호출자 접두사 `gems_`.
    중점:
    - 20성구 NWT verbatim 검증 (위 selected_gems 와 글자 단위 일치 — wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/24/{1,2,3} 재조회)
    - 핵심 어원: 렘 1:5 "야다"(알다), 렘 1:11-12 "샤케드/쇼케드"(아몬드/깨어 있음 — 언어 유희), 렘 2:13 "보르"(저수조), 렘 3:22 "슈브"(돌아오다)
    - 평행 성구 ≥5/성구: 렘 1:5 ↔ 시 139:13-16·갈 1:15·눅 1:15·롬 9:11 / 렘 2:13 ↔ 요 4:14·요 7:37-39·계 21:6 / 렘 3:22 ↔ 호 14:4·약 4:8
    - 신약 성취: 렘 1:5 → 갈 1:15 (바울 모태 부르심), 렘 2:13 → 요 4:14 (예수 = 생명의 물), 렘 3:17 → 계 21:24 (모든 민족 모임)
    피하기: 영혼 불멸 시사·다른 장 끌어오지 말 것·이모지 X.

  publication-cross-ref: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    중점:
    - 「예레」 43면 3항 verbatim — 공식 질문 1 핵심 ("신" 정의·우상 만드는 마음)
    - 「예레」 1장 (렘 1:5-8 부르심·소년 예레미야)
    - 「통찰」 1권 "예레미야 (예언자)" 항목 (1200002421) — 이름 어원·소명 배경
    - 「통찰」 1권 "아나돗" (1200000269) — 베냐민·예루살렘 북북동 5km
    - 「통찰」 2권 "예레미야서" (1200002422) — 기록 시기·신빙성·연대
    - 신세계역 연구 노트 — 렘 1:11 아몬드, 렘 2:13 저수조
    - docid 실존 검증 (가짜 절대 금지)
    피하기: 호수·면 추정 X·외국어판 끌어오지 말 것·"파수대 2024년 X월호" 식 미검증 인용 금지.

  application-builder: |
    공유 파일 6개 Read. 🟢🔴 의무. 접두사 `gems_`.
    중점:
    - 4축 강제 폐기 (자연스러움 우선)
    - 자기점검 질문 ≥10 gem 에 1개씩 — 의문문 + 노랑 강조
    - 렘 1:5 (모태 선택 - 자기 가치) / 렘 1:6 (자격 없음 - 회중 봉사) / 렘 1:11-12 (여호와의 깨어있음 - 약속 신뢰) / 렘 2:13 (두 가지 악 - 우선순위) / 렘 3:22 (회복 - 회개) 중점
    피하기: 상투적 청중 호명 ("여러분도 …해 보신 적") 절대 금지·정죄형 X·"가정 경배"·"신자" 단독·"여호와의 임재" 명사형 X.

  experience-collector: |
