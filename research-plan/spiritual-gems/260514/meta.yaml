    core: "슬픔에서 찬양으로의 전환 (재 대신 머리쓰개·환희의 기름)"
    application: "낙심한 형제자매와 함께 찬양의 노래·기도로 동행"
    lesson: "여호와는 우리의 슬픔을 찬양으로 갈아 입히신다"
  - no: 15
