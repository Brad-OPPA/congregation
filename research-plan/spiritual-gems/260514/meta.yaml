    lesson: "폐허 재건은 한 명 한 명의 회복으로부터 시작된다"
  - no: 17
    ref: "사 61:6"
    core: "회복된 자의 신성한 임명 — 여호와의 제사장·봉사자"
    application: "매일의 봉사를 단순 활동이 아닌 거룩한 임명으로 인식"
    lesson: "우리의 정체성은 봉사자 — 단순 자원봉사가 아닌 신성한 임명"
  - no: 18
    ref: "사 61:8"
    core: "여호와의 성품 — 공의 사랑·강탈 미움"
