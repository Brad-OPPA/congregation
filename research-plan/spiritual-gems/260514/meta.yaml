    lesson: "여호와의 시간표는 적대를 굴복으로 바꾸심"
  - no: 7
    ref: "사 60:17"
    core: "여호와의 도시 통치 원리가 평화·의"
    application: "회중·가정 안에서 다툼보다 평화·의를 우선하는 결정 내리기"
