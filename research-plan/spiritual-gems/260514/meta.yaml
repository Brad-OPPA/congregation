  - no: 2
    ref: "사 60:2"
    core: "세상이 어두울수록 여호와의 백성 위의 빛은 더 두드러짐"
    application: "도덕·영적 어둠이 짙은 시대에 부끄러워 말고 더 분명하게 진리를 살기"
    lesson: "어둠은 빛을 가리지 못하고 오히려 빛을 더 빛나게 함"
