# === 6단 방어 ① — 서브 리서처 지시서 ===
instructions_to_subresearchers:

  scripture-deep: |
    [공통 의무 — 모든 서브 공통]
    - `.claude/shared/multi-layer-defense.md` Read · 본인 ② 단계 확인
    - `.claude/shared/intro-and-illustration-quality.md` Read
    - 차등 적용표 dig-treasures 행 발췌:
      "14축 활용: 20개 성구 중 선택 2~3개에 결합 / 서론 외부 후크 N·A /
       요점당 예화 선택 (성구당 짧은 해설) / 삽화 N·A /
       적절성 8필터 필수 전부 / 최근 10년 출판물 회피 N·A"
    - 산출물 최상단 🟢 착수 블록 복사·체크. 완료 시 `_selfcheck.md` 🔴 종료 블록 PASS/FAIL.
    - FAIL 있으면 자체 재작업 (2회 한도).
    - 호출자 접두사: 파일명 prefix 로 `gems_` 사용 (예: gems_sa-63-10.md, gems_sa-64-8.md).

    [중점]
    이 주차 핵심 성구 3개 — 사 63:10 (★공식 질문 1) / 사 64:8 (★보물 나누기 1순위 카드)
    + 보조: 사 63:7-9 (참을성 맥락) · 사 63:16 (아버지 호칭)
    중점 항목:
      1. 사 63:10 — "성령을 근심하게 했다" 의 히브리어 「야아체부」(아차브) 어원 + NWT 연구 노트
         · 「통찰」 "자비" 12항 발췌 (자비의 한계)
         · 교차 성구: 엡 4:30, 시 78:40-42
      2. 사 64:8 — 도공(요체르)·진흙(호메르) 어원 + 고대 근동 도공 비유 배경 (보조 14축 #6 고고학·유물 결합 1단락)
         · 「파수대」 2016/6월호 6-10면 "여호와—우리를 빚으시는 분" 발췌
         · 교차 성구: 렘 18:1-6 (도공의 집), 롬 9:20, 21
      3. 사 63:7 헤세드 + 사 63:9 동정심(라카밈) 어원 (간략)
    피하기:
      - 다른 장의 성구 끌어오기 (사 62-64장 범위 엄수)
      - 비증인 학자 견해를 권위로 인용 (8필터 #8)
      - 진화론·도공의 진화 가설 같은 표현 (8필터 #1)
    저장: `research-bible/260521/gems_*.md`

  publication-cross-ref: |
    [공통 의무 — 위 scripture-deep 와 동일 (생략)]
    호출자 접두사: `gems_`

    [중점]
    주제 키워드: '여호와의 참을성', '성령을 근심하게', '자비의 한계', '도공·진흙', '아버지로서의 여호와'
    우선 검색 범위:
      - 「통찰」 자비 (12항 ★ wol 공식 참조), 인내, 영, 도공, 도공의 그릇, 아버지
      - 「파수대」 연구용 2016-2025 (특히 2016/6월호 "여호와—우리를 빚으시는 분" 6-10면 ★ 핵심)
      - 「예수 — 길, 진리, 생명」, 「여호와께 가까이 가십시오」 (해당 장)
      - 「깨어라!」 무관 — 영적 보물찾기는 거의 사용 X
    각 핵심 성구당 「파」·「통」·「하」·「예-1」 인용 3~5개 충분.
    호수·면·URL 4요소 필수 — 가짜 docid 만들지 말 것.
    피하기:
      - 외국어판·영문판 직접 인용 (한국어판 기준)
      - "「파수대」 ○○ 시리즈 기사들" 같은 모호한 집단 인용 (CLAUDE.md §1)
      - 존재하지 않는 책·기사 만들어내기
    저장: `research-topic/260521/gems_*.md`

  application-builder: |
    [공통 의무 — 동일 (생략)]
    호출자 접두사: `gems_`

    [중점]
    20개 성구마다 4축 적용 카드 1세트 (가정·직장/학교·회중·개인 영성).
    특히 우선순위:
      - 사 63:10 (질문 1): 회중·개인 영성 축 강조 — "오늘 내가 영을 근심하게 하지 않았는가" 자기점검
      - 사 64:8 (질문 2 카드): 가정·개인 영성 축 강조 — "여호와의 손에 빚어지기 쉬운 부드러운 진흙"
      - 사 62:6, 7: 야외 봉사 축 — "잠잠치 않는 파수꾼" 끈기
      - 사 62:10: 야외 봉사 축 — "큰길을 돋우라" 적극성
    자기점검 질문 1~2개 / 카드.
    피하기:
      - 정치·국가 관련 예시 (8필터 #2)
      - 회중 특정 인물·실명 언급
      - 논쟁적 현대 사안 (낙태·동성애 등) 강하게 다루기 (8필터 #7)
    저장: `research-application/260521/gems_*.md`

  experience-collector: |
    [공통 의무 — 동일 (생략)]
    호출자 접두사: `gems_`

    [중점]
    영적 보물찾기는 경험담 사용이 적음 — 그러나 사회자 보강 멘트에서 1~2개 사용 가능.
    주제: 여호와께 빚어진 경험·시련 중 함께 고통하시는 여호와 체험.
    출처: 연감·파수대 연구용·JW 방송 2020-2025.
    수집은 2~3개로 충분.
    피하기:
      - 실명 공개된 아동
      - 검증 불가 전승·도시전설 (8필터 #5)
      - 외부 비증인 미디어 경험담 (예: 일반 자기계발서)
    저장: `research-experience/260521/gems_*.md` (선택)

  illustration-finder: |
    [공통 의무 — 동일 (생략)]
    호출자 접두사: `gems_`

    [중점]
    영적 보물찾기는 docx 에 이미지 임베드 X (slot 이미지 카운트 0).
    그러나 사회자가 사 64:8 도공 비유 설명 시 짧은 비유 표현으로 사용할 수 있는 후보 1~2개.
    예: 고대 근동 도공 작업장 묘사·라기스·예루살렘 도자기 발굴 같은 14축 #6 (고고학·유물) 결합.
    [추가 책무]: 도입에 맞는 짧은 비유 후보도 함께 수집 (intro_image_candidates.json — 사용 안 해도 자료로 보존).
    피하기:
      - 종교 도상 (외부 종교화·이콘 등 절대 X)
      - 회중 특정 인물·실명 언급
    저장: `research-illustration/260521/gems_*.md` + (선택) `intro_image_candidates.json`

