instructions_to_subresearchers:
  qa-designer: |
    # 중점
    CBS 30분 형식의 문답 블록 설계. 사회자 — 청중 1~2명 — 사회자 보강 사이클을 두 장 각각에
    대해 짠다. 옛 docx 패턴 (260514·260507·260423) 의 "(필수) 연구 질문 → 답변 단락 →
    부가 해설 → 삽화 질문 → 우리가 배우는 점 → 마지막 질문" 6단 구조 그대로.

    # 우선 범위
    1. 88장 핵심 질문 (WOL 노란박스 verbatim — pid 10):
       "겟세마네 동산에서 무슨 일이 있었나요? 그날 밤 예수께서 하신 일로부터 어떤 교훈을
       배울 수 있을까요?"
       → 청중이 1~2 문장으로 대답할 수 있는 답변 bullets 4개 (본문 단락 1~4 에서 추출).
       → 사회자 보강 멘트 2~4문장 분량 (본문 재서술 금지, 배경·적용·연결만).
       → 확장 질문 1개: "그렇다면 갑작스러운 시련이 닥쳤을 때 우리는 어떻게 예수처럼
         평온함과 침착함을 유지할 수 있을까요?"
       → 삽화 질문 2개:
         (a) lfb/2017/860 (유다의 배신) — "이 삽화는 시험을 받는 우리에게 어떤 자세를
             가르쳐 줍니까?"
         (b) lfb/2017/862 (유다와 돈주머니) — "이 삽화는 우리의 우선순위에 대해 무엇을
             점검하게 합니까?"
       → (필수 질문 _마지막 질문): "참조 성구를 통해 무엇을 배우게 되었습니까? 오늘
         내용은 여호와에 대해 무엇을 알려 줍니까?" 답변 적용 (가정·회중·야외봉사 3축).

    2. 89장 핵심 질문 (WOL 노란박스 verbatim — pid 12):
       "가야바의 집 마당에서 무슨 일이 있었나요? 산헤드린은 예수를 죽이려고 어떤 죄를
       뒤집어씌웠나요?"
       → 청중 답변 bullets 4개 (본문 단락 1~6 에서 추출).
       → 사회자 보강 멘트 2~4문장 (자만·야간 재판 율법 위반·회복 강조).
       → 확장 질문 1개: "베드로가 다시 일어설 수 있었던 비결은 무엇이며, 우리도 넘어졌을 때
         그 비결을 어떻게 적용할 수 있을까요?"
       → 삽화 질문 1개 (lfb/2017/871): "이 삽화는 사회적 압력 가운데에서 우리에게 어떤
         점검을 하게 합니까?"
       → 마지막 질문 답변 적용 (3축, "예수의 시선·베드로의 눈물·회복" 강조).

    # 피하기
    - 본문 verbatim 재서술 금지 (본문은 낭독자 담당)
    - 공식 (필수) 연구 질문 verbatim 재서술 금지
    - "여러분도 …해 보신 적 있으십니까?" 류 상투적 청중 호명 금지
    - 정치·국가·타 종교 교리 긍정 금지
    - "예배" 단어 (집회로), "신앙·간증·사역·복음 단독" 단어 금지

    # publication symbol 분리 의무 ⚠
    - 전면 (이번 주 교재) = "「훈」 88장" / "「훈」 89장" / "「내가 좋아하는 성경 이야기」 NN장"
    - 횡단 (성인용 깊이 인용) = "「예수」 책 NN장" — 반드시 "책" 명시
    - 「훈」 docid: 88장 1102016098, 89장 1102016099 (lfb)
    - 「예수」 책 docid: 1102014XXX (jy) — 별도 책

  scripture-deep: |
    # 중점
    표어 성구 2개 (요 16:33, 요 16:32) + 보강 후보 5개에 대해 신세계역 연구용 성서의
    연구 노트·상호 참조·원어 정보 수집.

    # 필수 성구 목록 (WOL fetch 의무)
    1. **요한복음 16:33** (88장 표어, pid 8): "세상에서는 여러분이 환난을 겪을 것이나
       용기를 내십시오! 내가 세상을 이겼습니다."
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/43/16 연구 노트 전문
       → "세상을 이겼다" 의 헬라어 nikao (νικάω) 의미 — 완료형 "이미 이김" 강조
       → 마지막 만찬 직후 ('이별 강화') 의 문맥
    2. **요한복음 16:32** (89장 표어, pid 10): "여러분이 각자 자기 집으로 흩어져 나를
       혼자 버려둘 때가 ··· 왔습니다. 그러나 아버지께서 나와 함께 계시므로 나는 혼자가
       아닙니다."
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/43/16 연구 노트 전문
       → 슥 13:7 (목자가 칠 것이니 양들이 흩어지리라) 예언 성취 연결
    3. **마태복음 26:39** (88장 보강): 예수의 겟세마네 기도 verbatim
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/40/26 연구 노트
       → "이 잔" 의 의미 — 비유적 "고난의 잔" 인지 더 깊은 신학적 의미인지
    4. **누가복음 22:43** (88장 보강): 천사가 힘을 더해 줌
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/42/22 연구 노트
       → 사본 변형 정보 (이 절이 일부 사본에 없음 — 「통찰」 또는 신세계역 부록 확인)
    5. **요한복음 13:38** (89장 보강): 예수의 부인 예언
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/43/13 연구 노트
       → 베드로의 호언 (요 13:37) 직후의 예언
    6. **누가복음 22:31, 32** (89장 보강): "사탄이 너희를 까불러 밀처럼 거르려고…
       내가 너의 믿음이 떨어지지 않도록 너를 위해 간청했다"
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/42/22 연구 노트
       → "까부르다 (시프트)" 의 농경 비유
    7. **누가복음 22:61, 62** (89장 보강): 예수의 시선·베드로의 눈물
       → 단순·솔직한 회개의 본
    8. **「통찰」 항목**: "겟세마네", "안나스", "가야바", "산헤드린", "모독" — 각각의
       URL·면 번호 수집

    # 우선 범위
    - 신세계역 연구용 성서 (nwtsty) 연구 노트 2026년 최신판
    - 「통찰」 (it-1, it-2) 의 관련 인명·지명·용어
    - 헬라어 원어 의미 — 회중 청중에게 자연스럽게 전달 가능한 수준
    - 사본 변형 정보 (눅 22:43-44 처럼 학술적 가치 있는 것)

    # 피하기
    - 다른 장의 성구 끌어오지 말 것 (위 목록 + 본문 인용 성구만)
    - 학술적·신학적 추측 금지
    - 외국어판 (영문판 제외) 인용 금지

    # publication symbol 분리 의무 ⚠
    - 「훈」 = lfb (1102016XXX), 88장 1102016098, 89장 1102016099
    - 「예수」 책 = jy (1102014XXX) — 횡단 인용 시 docid 정확히 표기

  publication-cross-ref: |
    # 중점
    두 장의 핵심 키워드별로 「예수」 책 (jy)·「통찰」·「파」 연구용·「하느님 사랑」·「깨어라!」
    횡단 검색.

    # 우선 범위 (검색 키워드)
    1. **88장 키워드**:
       - "겟세마네" 지형·올리브 산·기름 짜는 곳 → 「통찰」 제1권 "겟세마네" 항목 (URL·면)
       - "예수의 체포 / 유다의 배신" → 「예수 — 길, 진리, 생명」 (jy) 책의 해당 장
         (장 번호는 wol fetch 로 확정. **반드시 "「예수」 책 NN장"** 표기)
       - "안나스" → 「통찰」 제2권 "안나스" 항목 — 전직 대제사장·5명의 사위·아들이 대제사장
       - "가야바" → 「통찰」 제2권 "가야바" 항목 — 안나스의 사위·서기 18-36 대제사장
       - "기도와 시련" / "주의 천사의 도움" → 최근 10년 「파」 연구용 (2018-2025) 1편
       - "겟세마네 동산 발굴" 고고학 → 「깨어라!」 (있다면)

    2. **89장 키워드**:
       - "베드로의 부인 / 회복" → 「예수 — 길, 진리, 생명」 (jy) 책의 해당 장 (장 번호
         wol fetch 확정. **반드시 "「예수」 책 NN장"** 표기)
       - "산헤드린" 71명 구조·재판 절차 → 「통찰」 제2권 "산헤드린" 항목
       - "야간 재판 율법 위반" → 「통찰」 또는 「파」 연구용 (모세 율법 사형 사건 야간 재판 금지)
       - "모독죄" → 「통찰」 "모독" 항목 — 레 24:16 율법 + 신성한 이름 사용 사두개·바리새파 해석
       - "자만 경계 / 회개로 회복" → 최근 10년 「파」 연구용 (2018-2025) 각 1편
       - "예수의 단호한 회복 — 부활 후 베드로 회복 (요 21:15-19)" → 「예수」 책 해당 장

    # 출력 형식
    각 항목: 출판물명·호수·면·URL·한 줄 요지. 4 요소 완비 또는 [확인 필요].

    # 피하기
    - 같은 논지의 교차 참조는 가장 권위있는 + 가장 최근 1편만 (중복 금지)
    - 외국어판 (영문 제외) 인용 금지
    - 너무 학술적인 자료 (회중 청중 수준 초과) 금지

    # publication symbol 분리 의무 ⚠
    - 「훈」 = lfb (1102016XXX). 이번 주 88장 = 1102016098, 89장 = 1102016099.
    - 「예수」 책 = jy (1102014XXX) — **별도 책**. 「예수」 책 횡단 인용 시 반드시 docid
      1102014XXX 범위에서 찾고, 표기는 "「예수」 책 NN장" (책 명시 의무).
    - 어린이용 lfb 본문은 표현이 단순 — 사회자 보강은 「예수」 책 (jy) + 「통찰」 등
      성인용 자료에서 깊이 보충.

  application-builder: |
    # 중점
    두 장의 적용점을 4축 (가정·직장/학교·회중·야외봉사) 으로 정리. 각 장에 자기점검 질문
    1~2개.

    # 우선 범위
    1. **88장 적용 (시련의 평온 — 미리 기도해 마음 준비)**:
       - **가정**: 자녀가 학교에서 어려움을 알리기 시작할 때, 부모는 "나중에 보자" 가
         아니라 그 자리에서 함께 기도해 시선을 여호와께 두도록 인도한다.
       - **직장/학교**: 시험·경쟁·인간관계 압박 가운데에서 시선을 결과(폭풍) 가 아니라
         하느님께 두는 구체 방법 — 출근/등교 전 짧은 묵상 1~2분.
       - **회중**: 형제가 시련을 겪을 때 "혼자 두지 않으시는" 여호와의 본을 따라 한 통의
         안부 전화·한 번의 방문으로 함께한다.
       - **야외봉사**: 거절·무시·조롱을 만났을 때 예수처럼 차분하게 "여러분 평안하시기
         바랍니다" 의 자세를 잃지 않는다.
       - 자기점검 질문: "최근 한 주, 시련을 미리 예상하고 기도로 마음을 준비한 적이
         얼마나 있었습니까?"

    2. **89장 적용 (자만 경계·회개로 회복)**:
       - **가정**: 자녀가 자기 약점을 인정하기 전에 "나는 절대 그러지 않아" 라는 자만에
         빠지지 않도록, 부모가 먼저 자신의 약함을 솔직히 나누는 본을 보인다.
       - **직장/학교**: 사회적 압력 가운데에서 신앙을 변호해야 할 때, 베드로의 부인이
         아니라 회복된 베드로 (행 4:13의 담대함) 의 본을 따른다.
       - **회중**: 형제가 영적으로 넘어졌을 때 우리는 정죄하기 전에 예수의 시선처럼
         "돌아오라" 는 따뜻한 시선을 먼저 건넨다.
       - **야외봉사**: 사람들 앞에서 자기 신앙을 분명히 증언 — "한 가지 분명히 아는 것은…"
         의 단순·솔직 증언 본 (눈먼 사람의 본, 요 9:25).
       - 자기점검 질문: "내가 가장 자만하기 쉬운 영역은 무엇이며, 그 영역에서 어떻게
         미리 겸손할 수 있습니까?"

    # 피하기
    - 정치·국가·민족 관련 예시 금지
    - 회중 특정 인물 직접 거명 금지
    - 너무 추상적인 표현 ("…하시기 바랍니다") 금지 — 구체 행동 1~2개 명시
    - "여러분도 …해 보신 적 있으십니까?" 류 상투적 청중 호명 금지

    # publication symbol 분리 의무 ⚠
    - 인용·참조 시 「훈」 = lfb 1102016XXX, 「예수」 책 = jy 1102014XXX 분리 표기

  experience-collector: |
    # 중점 (선택, 시간 여유 있을 때만)
    두 장 주제 관련 공식 경험담 수집. CBS 30분 안에 들어갈 수 있는 짧은 1~2분 분량.

    # 우선 범위
    1. **88장 — 시련 가운데 평온·미리 기도 경험담**:
       - 갑작스러운 위기 (질병·사고·실직) 한가운데에서 평소의 기도와 성경 묵상 덕분에
