paragraphs:
  # 88장 본문 verbatim (WOL pid 기준)
  - chapter: 88
    pid: 3
    num: 1
    text: |
      예수와 사도들은 기드론 골짜기를 지나 올리브 산으로 갔어요. 때는 밤 12시가 지난 시간이었고 하늘에는 보름달이 떠 있었지요. 겟세마네 동산에 도착하자, 예수께서 사도들에게 말씀하셨어요. "여기에 머물러 있으세요. 깨어 있어야 합니다." 그런 다음, 동산 안으로 조금 더 들어가서 땅에 무릎을 꿇으셨어요. 예수께서는 몹시 괴로워하며 여호와께 이렇게 기도하셨어요. "아버지의 뜻이 이루어지게 하십시오." 그러자 여호와께서 한 천사를 보내 예수가 힘을 내도록 도와주셨어요. 그 후 예수께서 돌아와 보니 세 사도가 잠들어 있었어요. 예수께서 말씀하셨어요. "일어나십시오! 지금은 잠들어 있을 때가 아닙니다! 내가 적들에게 넘겨질 시간이 왔습니다."
    scriptures: []
  - chapter: 88
    pid: 4
    num: 2
    text: |
      이윽고 유다가 칼과 몽둥이를 든 무리를 이끌고 나타났어요. 이전에 예수와 함께 이 동산에 자주 왔기 때문에 예수께서 어디에 계실지 알고 있었던 거예요. 유다는 이미 군인들에게 누가 예수인지 알려 주겠다고 말해 두었어요. 그는 예수를 보자 곧바로 다가가 "선생님, 안녕하십니까?" 하고 말하며 입을 맞추었어요. 예수께서 말씀하셨어요. "유다, 당신은 입맞춤으로 나를 배신합니까?"
    scriptures: []
  - chapter: 88
    pid: 5
    num: 3
    text: |
      예수께서는 앞으로 나가시더니 사람들에게 "누구를 찾고 있습니까?" 하고 물으셨어요. 그들은 "나사렛 사람 예수요" 하고 대답했어요. 예수께서 "내가 그 사람입니다"라고 하시자, 사람들은 뒷걸음치다가 땅에 넘어졌어요. 예수께서 다시 한번 물으셨어요. "누구를 찾고 있습니까?" 그들은 또다시 "나사렛 사람 예수요" 하고 대답했지요. 예수께서 말씀하셨어요. "이미 말한 대로 내가 바로 그 사람입니다. 이 사람들은 보내 주십시오."
    scriptures: []
  - chapter: 88
    pid: 6
    num: 4
    text: |
      베드로는 어떤 상황인지 깨닫고는 칼을 뽑아 대제사장의 종인 말고의 귀를 잘라 버렸어요. 하지만 예수께서 말고의 귀를 만져 낫게 해 주셨지요. 그런 다음 베드로에게 말씀하셨어요. "칼을 치우십시오. 칼로 싸우는 사람은 칼로 죽게 될 것입니다." 군인들은 예수를 붙잡아 그분의 손을 묶었어요. 그러자 사도들은 달아나 버렸어요. 군인들은 예수를 수제사장 안나스에게 끌고 갔어요. 안나스는 예수를 조사한 뒤에 대제사장 가야바의 집으로 보냈어요. 그러면 예수의 사도들은 어떻게 되었을까요?
    scriptures: []

  # 89장 본문 verbatim
  - chapter: 89
    pid: 3
    num: 1
    text: |
      예수께서는 사도들과 함께 위층 방에 계실 때, "오늘 밤 여러분 모두가 나를 버릴 것입니다"라고 말씀하셨어요. 그때 베드로는 이렇게 대답했지요. "저는 아닙니다! 다른 사람들이 모두 주를 버려도 저는 절대로 주를 버리지 않을 겁니다." 하지만 예수께서는 "닭이 울기 전에 당신은 세 번이나 나를 모른다고 말할 것입니다"라고 말씀하셨어요.
    scriptures: []
  - chapter: 89
    pid: 4
    num: 2
    text: |
      군인들이 예수를 가야바의 집으로 끌고 갈 때 대부분의 사도들은 도망쳐 버렸어요. 하지만 두 사도는 사람들 틈에 섞여 예수를 따라갔지요. 그중 하나가 베드로였어요. 그는 가야바의 집 마당으로 들어가서 불을 쬐고 있었어요. 불빛에 드러난 베드로의 얼굴을 보고 한 하녀가 말했어요. "당신이 누군지 알아요! 예수와 함께 다니던 사람 맞죠?"
    scriptures: []
  - chapter: 89
    pid: 5
    num: 3
    text: |
      베드로가 대답했어요. "그렇지 않소! 당신이 무슨 말을 하는지 모르겠소!" 그러고는 현관 쪽으로 갔어요. 잠시 후 다른 하녀가 베드로를 알아보고 "이 사람은 예수와 함께 있던 사람이에요!" 하고 사람들에게 말했어요. 베드로는 "난 예수가 누군지도 모르오!" 하고 대답했어요. 또 어떤 남자가 말했어요. "당신은 그들과 한패요! 사투리를 쓰는 걸 보니, 당신도 예수처럼 갈릴리 사람인 게 틀림없소." 그러자 베드로는 "나는 그 사람을 모르오!" 하고 맹세하며 말했어요.
    scriptures: []
  - chapter: 89
    pid: 6
    num: 4
    text: |
      바로 그때 닭이 울었어요. 예수께서 고개를 돌려 베드로를 보셨고, 베드로는 예수와 눈이 마주쳤지요. 베드로는 예수의 말씀이 생각나서 밖으로 나가 몹시 슬퍼하며 울었어요.
    scriptures: []
  - chapter: 89
    pid: 7
    num: 5
    text: |
      한편, 가야바의 집 안에서는 산헤드린 법정이 열려 예수의 재판이 진행되었어요. 예수를 죽이기로 작정한 산헤드린 재판관들은 그분을 죽일 구실을 찾고 있었지요. 하지만 그분에게서 아무런 잘못도 찾지 못했어요. 마침내, 가야바가 예수께 이렇게 분명히 물었어요. "당신이 하느님의 아들이오?" 예수께서는 "그렇습니다" 하고 대답하셨어요. 가야바가 말했어요. "더 이상 무슨 증거가 필요하겠습니까? 이건 하느님을 모독하는 말입니다!" 재판관들은 맞장구를 치며 "이 사람은 죽어 마땅합니다"라고 했어요. 그들은 예수의 뺨을 때리고, 얼굴에 침을 뱉고, 그분의 눈을 가리고 주먹으로 치면서 "네가 예언자라면, 누가 너를 쳤는지 알아맞혀 보아라!" 하고 말했지요.
    scriptures: []
  - chapter: 89
    pid: 8
    num: 6
    text: |
      날이 밝자, 그들은 예수를 산헤드린 회의실로 끌고 가 다시 한번 물었어요. "당신이 하느님의 아들이오?" 예수께서는 "내가 하느님의 아들이라고 여러분이 말하고 있습니다"라고 대답하셨어요. 그러자 재판관들은 예수에게 하느님을 모독했다는 죄를 뒤집어씌우고, 로마 총독인 본디오 빌라도가 있는 곳으로 데려갔어요. 이제 무슨 일이 일어날까요? 다음 장에서 알아보기로 해요.
    scriptures: []

