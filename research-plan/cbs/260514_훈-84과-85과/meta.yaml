paragraphs:
  # 84장 본문 verbatim (WOL pid 기준)
  - chapter: 84
    pid: 3
    num: 1
    text: |
      예수께서는 병을 고치고 죽은 사람을 살리실 뿐 아니라, 바람과 비를 조종하실 수도 있었어요. 예수께서 산에서 기도를 마치고 갈릴리 바다를 내려다보니 폭풍이 몰아치고 있었어요. 배에 타고 있던 사도들은 바람을 거슬러 노를 젓느라 매우 힘들어하고 있었지요. 예수께서는 산에서 내려와 그 배를 향해 물 위를 걸어가기 시작하셨어요. 사도들은 누군가가 물 위로 걸어오는 모습을 보고 겁에 질렸어요. 그러자 예수께서 말씀하셨어요. "나입니다. 두려워하지 마십시오."
    scriptures: []
  - chapter: 84
    pid: 4
    num: 2
    text: |
      베드로가 말했어요. "주여, 정말 주이시라면 저한테 주에게로 오라고 하십시오." 예수께서는 "오십시오" 하고 대답하셨어요. 그러자 베드로는 폭풍이 몰아치는데도 배에서 내려 예수를 향해 물 위를 걸어갔어요. 하지만 베드로는 예수께 거의 다 왔을 때, 폭풍을 바라보고 말았어요. 그러자 두려운 마음이 들었고 물에 빠지기 시작했지요. 베드로는 "주여, 구해 주십시오!" 하고 소리쳤어요. 예수께서 베드로의 손을 잡으며 말씀하셨어요. "왜 의심했습니까? 당신의 믿음은 어디 있습니까?"
    scriptures: []
  - chapter: 84
    pid: 5
    num: 3
    text: |
      예수께서 베드로와 함께 배에 오르시자, 순식간에 폭풍이 잠잠해졌어요. 사도들은 어떤 느낌이 들었을까요? 그들이 말했어요. "주는 정말로 하느님의 아들이십니다."
    scriptures: []
  - chapter: 84
    pid: 6
    num: 4
    text: |
      예수께서 날씨를 조종하신 것은 이번만이 아니었어요. 한번은 예수께서 사도들과 배를 타고 갈릴리 바다를 건너시던 중에, 배 뒤쪽에서 잠이 드셨어요. 그때 거센 폭풍이 불어닥쳤고, 파도가 사정없이 몰아쳐 배 안에 물이 차올랐어요. 사도들은 예수를 깨우며 소리쳤어요. "선생님, 우리가 죽게 생겼습니다! 도와주세요!" 예수께서는 일어나 바다를 향해 "조용히 해라!" 하고 말씀하셨어요. 그러자 즉시 바람이 그치고 바다가 잠잠해졌어요. 예수께서는 사도들에게 "여러분의 믿음은 어디 있습니까?" 하고 말씀하셨어요. 사도들이 서로 말했어요. "바람과 바다까지도 이분에게 순종하는구나." 사도들은 예수를 굳게 믿으면 아무것도 두려워할 필요가 없다는 것을 배우게 되었지요.
    scriptures: []

  # 85장 본문 verbatim
  - chapter: 85
    pid: 3
    num: 1
    text: |
      바리새인들은 예수를 미워해서 어떻게든 트집을 잡아 그분을 체포하고 싶어 했어요. 그들은 예수가 안식일에 병을 고치는 것은 잘못이라고 말했지요. 어느 안식일에 예수께서는 눈먼 사람이 길거리에서 구걸하는 것을 보셨어요. 그분이 제자들에게 말씀하셨어요. "하느님의 능력이 어떻게 이 사람에게 나타나는지 보십시오." 그런 다음, 흙에 자기 침을 섞어 진흙으로 만들어서 그의 눈에 발라 주셨어요. 그러고는 "실로암 연못에 가서 눈을 씻으십시오"라고 하셨지요. 그 사람이 그렇게 했더니 태어나서 처음으로 앞을 볼 수 있게 되었어요.
    scriptures: []
  - chapter: 85
    pid: 4
    num: 2
    text: |
      사람들은 깜짝 놀라 말했어요. "이 사람이 전에 앉아서 구걸하던 그 사람 맞소? 아니면 그저 그와 닮은 사람인 거요?" 그러자 그는 "내가 그 사람이 맞습니다!"라고 했어요. 사람들이 물었어요. "그럼 어떻게 눈을 뜨게 되었소?" 그가 자기에게 무슨 일이 있었는지 이야기하자, 사람들은 그를 바리새인들에게 데려갔어요.
    scriptures: []
  - chapter: 85
    pid: 5
    num: 3
    text: |
      그가 바리새인들에게 말했어요. "예수께서 제 눈에 진흙을 바르시고, 가서 씻으라고 하셨습니다. 제가 그렇게 했더니, 지금처럼 볼 수 있게 되었습니다." 바리새인들이 말했어요. "예수가 안식일에 눈먼 사람을 고쳤다면, 그 능력은 하느님에게서 온 것이 아니오." 하지만 이렇게 말하는 사람들도 있었어요. "하느님께서 능력을 주지 않으셨다면, 어떻게 눈먼 사람을 고칠 수 있겠소?"
    scriptures: []
  - chapter: 85
    pid: 6
    num: 4
    text: |
      바리새인들은 그 사람의 부모를 불러 "당신네 아들이 지금 어떻게 볼 수 있게 된 거요?" 하고 물었어요. 그의 부모는 겁이 났어요. 전에 바리새인들이 예수를 믿는 사람은 누구든 회당에서 쫓아낼 거라고 말했거든요. 그래서 "저희는 모릅니다. 아들에게 직접 물어보십시오"라고 대답했어요. 바리새인들은 그 사람에게 또다시 이것저것 물어보았어요. 그러자 결국 그가 이렇게 말했어요. "제가 아는 건 다 말씀드렸는데, 왜 자꾸 물어보시는 거죠?" 바리새인들은 몹시 화가 나서 그를 쫓아내 버렸어요.
    scriptures: []
  - chapter: 85
    pid: 7
    num: 5
    text: |
      예수께서는 그 사람을 찾아가서 "당신은 메시아를 믿습니까?" 하고 물으셨어요. 그 사람은 "그분이 누구인지 알 수 있다면, 제가 믿겠습니다" 하고 대답했어요. 예수께서 말씀하셨어요. "내가 메시아입니다." 예수께서 그 사람을 매우 친절하게 대하셨다는 것을 알 수 있지 않나요? 그 사람을 고쳐 주셨을 뿐 아니라 믿음을 갖게 도와주셨으니까요.
    scriptures: []

