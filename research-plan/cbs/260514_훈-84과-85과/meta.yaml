instructions_to_subresearchers:
  qa-designer: |
    # 중점
    CBS 30분 형식의 문답 블록 설계.  사회자 - 청중 1~2명 - 사회자 보강 사이클을 두 장 각각에 대해 짠다.
    옛 docx 패턴 (260507 훈82-83) 의 "(필수) 연구 질문 → 답변 단락 → 부가 해설 → 삽화 질문 →
    우리가 배우는 점 → 마지막 질문" 6단 구조 그대로.

    # 우선 범위
    1. 84장 핵심 질문 "베드로는 왜 물에 빠지기 시작했나요? 사도들은 예수로부터 어떤 교훈을 배우게 되었나요?"
       → 청중이 1~2 문장으로 대답할 수 있는 답변 bullets 4개 (본문 단락 1~4 에서 추출).
       → 사회자 보강 멘트 2~4문장 분량 (본문 재서술 금지, 적용·연결만).
