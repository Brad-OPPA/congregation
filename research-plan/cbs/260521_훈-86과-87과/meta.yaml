note_on_book: |
  WOL 주차 인덱스(https://wol.jw.org/ko/wol/dt/r8/lp-ko/2026/5/18) 의 "8. 회중 성서 연구" 항목은
  "(30분) 「훈」 86장, 13부 소개 및 87장" 으로 표기. 실제 docid 1102016096 / 1102016143 / 1102016097
  의 publication symbol = `lfb` (Learn From the Bible / 「내가 좋아하는 성경 이야기」 어린이용 그림
  성경 이야기책, 2017). 회중 통칭 "훈" 과 실제 lfb 가 다름.
  86장 "예수께서 나사로를 부활시키시다" 동일 일화는 「예수 — 길, 진리, 생명」 (jy) 책 **제90장
  "「부활이며 생명입니다」" (docid 1102014690) + 제91장 "나사로가 부활되다" (docid 1102014691,
  214-215면)** 두 챕터에서 성인용 권위 해설로 다룸. (publication-cross-ref WOL fetch 검증
  2026-05-02 — meta.yaml 초안의 단일 90장 추정은 부분 정답, 실제는 90+91장 두 챕터 분량.)
  87장 "예수의 마지막 저녁 식사" 동일 일화는 「예수」 책 **제117장 "주의 만찬" (docid 1102014717)**
  에서 성인용 해설. (publication-cross-ref WOL fetch 검증 2026-05-02 — meta.yaml 초안의 121장
  추정은 오류로 정정. 121장은 "용기를 내십시오! 내가 세상을 이겼습니다" — 요한 16장 끝 부분으로
  87장 본문과 직접 매칭 X.) 87장 보조 횡단 인용으로 활용 가능: 제118장 "누가 더 큰지에 대한
  논쟁" (1102014718) — 큰사람 다툼 / 제120장 "열매 맺는 가지로서 예수의 친구가 되다"
  (1102014720) — 새 계명 / 제122장 "예수께서 위층 방에서 마치는 기도를 하시다" (1102014722) —
  마지막 기도.
  13부 소개는 13부 (87장 ~ 마지막 장) 의 큰 맥락 — 예수의 희생·부활·제자들의 사명 — 을 1단락
  + 핵심 교훈 3개로 압축. CBS 30분 안에 86장 본문 + 13부 도입 1단락 + 87장 본문이 모두 들어가야
  하므로 시간 배분 매우 타이트.
  ⚠ publication symbol 분리 의무: script 안 표기는 전면="「훈」 NN장" 또는 "「내가 좋아하는 성경
  이야기」 NN장" / 횡단 인용="「예수」 책 NN장" (jy 1102014XXX) 으로 명확 구분.
  ⚠ 경험담 익명화 (cbs-script ④ 단계 적용): cbs_86_matthew (7세 아동) → "한 소년" / "어떤
  어린이" 으로 / cbs_87_artem → 국가명 미명시 + "어떤 형제가 수감 중에…" 일반화 (정치 박해
  현재 진행형 회피).

