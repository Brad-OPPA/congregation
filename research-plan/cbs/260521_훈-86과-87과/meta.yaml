paragraphs:
  # 86장 본문 verbatim (WOL pid 기준)
  - chapter: 86
    pid: 3
    num: 1
    text: |
      베다니라는 마을에 예수와 아주 친한 세 친구가 살고 있었어요. 그들은 나사로 그리고 그의 두 누이인 마리아와 마르다였지요. 어느 날, 마리아와 마르다가 요르단 강 건너편에 계신 예수께 급히 사람을 보내 이런 소식을 전했어요. "나사로가 많이 아픕니다. 빨리 와 주세요!" 하지만 예수께서는 그곳으로 바로 떠나지 않으셨어요. 계시던 곳에 이틀을 더 머무신 다음, 제자들에게 "베다니로 갑시다. 나사로가 잠을 자고 있습니다. 내가 가서 그를 깨울 것입니다"라고 말씀하셨지요. 사도들이 대답했어요. "나사로가 자고 있다면, 몸이 금방 나을 거예요." 하지만 예수께서는 사실 나사로가 죽었다는 뜻으로 말씀하신 것이었어요.
    scriptures: []
  - chapter: 86
    pid: 4
    num: 2
    text: |
      예수께서 베다니에 도착해 보니, 나사로가 죽어 무덤에 있은 지 벌써 4일이나 되었어요. 많은 사람이 마르다와 마리아를 위로하고 있었지요. 마르다는 예수께서 오셨다는 말을 듣고 서둘러 나가 그분을 맞이했어요. 마르다가 말했어요. "주여, 주께서 여기 계셨더라면 제 오라비가 죽지 않았을 거예요." 예수께서 말씀하셨어요. "당신의 오라비는 살아날 겁니다. 마르다, 당신은 이것을 믿나요?" 마르다가 대답했어요. "나중에 부활이 있을 때 오라비가 다시 살아날 것이라는 걸 믿습니다." 예수께서는 "나는 부활이며 생명입니다"라고 말씀하셨어요.
    scriptures: []
  - chapter: 86
    pid: 5
    num: 3
    text: |
      마르다는 마리아에게 가서 "예수께서 오셨어"라고 말해 주었어요. 마리아가 예수께 달려갔고 사람들도 따라갔지요. 마리아는 예수의 발 앞에 엎드려 하염없이 눈물을 흘렸어요. 그리고 이렇게 말했어요. "주여, 주께서 여기 계셨더라면 제 오라비가 살아 있을 겁니다!" 마리아가 매우 슬퍼하는 모습을 보시고 예수께서도 눈물을 흘리셨어요. 사람들은 예수께서 우시는 모습을 보고 "저분이 나사로를 얼마나 많이 사랑하셨는지 보세요" 하고 말했어요. "그런데 왜 자기 친구의 병을 고쳐 주지 않으셨을까요?"라고 말하는 사람도 있었지요. 이제 예수께서는 어떻게 하실까요?
    scriptures: []
  - chapter: 86
    pid: 6
    num: 4
    text: |
      예수께서는 무덤으로 가셨어요. 커다란 돌이 무덤 입구를 막고 있었지요. 예수께서 사람들에게 "돌을 치우십시오"라고 하셨어요. 그러자 마르다가 말했어요. "죽은 지 4일이나 되었어요! 시체에서 냄새가 날 거예요." 그래도 사람들은 돌을 굴려 옆으로 치웠어요. 이제 예수께서 기도하셨어요. "아버지, 제 말을 들어 주셔서 감사합니다. 저는 아버지께서 언제나 제 말을 들어 주신다는 것을 알고 있습니다. 하지만 아버지께서 저를 보내셨다는 것을 이 사람들이 알 수 있도록 아버지께 소리 내어 기도드립니다." 그런 다음 예수께서는 큰 소리로 "나사로, 나오십시오!" 하고 외치셨어요. 그러자 정말로 나사로가 천에 싸인 채 무덤 밖으로 걸어 나왔어요!
    scriptures: []
  - chapter: 86
    pid: 7
    num: 5
    text: |
      이것을 보고 많은 사람이 예수를 믿게 되었어요. 하지만 어떤 사람들은 바리새인들에게 가서 무슨 일이 있었는지 알렸어요. 그때부터 바리새인들은 나사로와 예수를 둘 다 죽이려고 했지요. 12사도 중 하나인 가룟 유다는 몰래 바리새인들에게 가서 이렇게 말했어요. "당신들이 예수를 찾도록 내가 도와주면, 나에게 얼마를 주겠소?" 바리새인들은 은 30닢을 주기로 했지요. 이제 유다는 예수를 넘겨줄 기회를 찾기 시작했어요.
    scriptures: []

  # 13부 소개 본문 verbatim (도입 1단락 + 핵심 교훈 3개)
  - chapter: "13부 소개"
    pid: 2
    num: 1
    text: |
      예수께서는 불완전한 사람들을 위해 자신의 생명을 희생하려고 이 땅에 오셨습니다. 그분은 죽임을 당하셨지만 세상을 이기셨습니다. 여호와께서는 아들에게 충성을 나타내셔서 그를 부활시키셨습니다. 예수께서는 숨을 거두실 때까지 겸손히 다른 사람들을 섬기고 그들의 잘못을 용서해 주셨습니다. 그분은 부활되신 뒤에 제자들에게 나타나셨습니다. 그리고 그들에게 맡기신 중요한 일을 어떻게 수행해야 하는지 가르쳐 주셨습니다. 여러분이 부모라면, 오늘날 우리도 이 일에 참여하고 있다는 것을 자녀가 이해하도록 도와주십시오.
    scriptures: []
  - chapter: "13부 소개"
    pid: 5
    num: 2
    text: "여호와께서 해결하실 수 없는 문제란 없다"
    scriptures: []
    role: key_lesson_1
  - chapter: "13부 소개"
    pid: 6
    num: 3
    text: "예수처럼 기꺼이 다른 사람들을 섬기고 도와주어야 한다"
    scriptures: []
    role: key_lesson_2
  - chapter: "13부 소개"
    pid: 7
    num: 4
    text: "참그리스도인들은 서로에게 나타내는 사랑으로 구별된다"
    scriptures: []
    role: key_lesson_3

  # 87장 본문 verbatim
  - chapter: 87
    pid: 3
    num: 1
    text: |
      유대인들은 매년 니산월 14일에 유월절을 기념했어요. 유월절은 여호와께서 자신의 백성을 이집트 노예 생활에서 구출해 약속의 땅으로 데려오신 일을 떠올리게 해 주었지요. 기원 33년에 예수와 사도들은 예루살렘의 어느 위층 방에서 유월절을 기념했어요. 유월절 식사를 마칠 때쯤 예수께서 말씀하셨어요. "여러분 중 한 사람이 나를 배신할 것입니다." 사도들은 크게 놀라 "그 사람이 누구입니까?" 하고 물었어요. 예수께서는 "내가 이 빵을 건네주는 사람입니다"라고 말씀하셨어요. 그러고는 빵 조각을 가룟 유다에게 주셨어요. 그러자 유다는 즉시 그 자리를 떠났지요.
    scriptures: []
  - chapter: 87
    pid: 4
    num: 2
    text: |
      이제 예수께서는 기도를 드리고, 빵을 여러 조각으로 나눈 다음, 남아 있던 사도들에게 주며 말씀하셨어요. "이 빵을 드십시오. 이것은 여러분을 위해 줄 내 몸을 의미합니다." 이어서 포도주에 대해 기도하신 다음, 사도들에게 주며 말씀하셨어요. "이 포도주를 마시십시오. 이것은 죄를 용서하기 위해 쏟게 될 내 피를 의미합니다. 내가 약속하는데, 여러분은 하늘에서 나와 함께 왕이 될 것입니다. 나를 기억하기 위해 매년 이 일을 하십시오." 지금도 예수의 제자들은 매년 니산월 14일 저녁에 함께 모인답니다. 그 모임을 주의 만찬이라고 부르지요.
    scriptures: []
  - chapter: 87
    pid: 5
    num: 3
    text: |
      주의 만찬을 마친 뒤에, 사도들은 자기들 중 누가 가장 중요한 사람인지에 대해 말다툼을 벌였어요. 하지만 예수께서는 이렇게 말씀하셨어요. "여러분은 자신을 가장 어리다고 여기고 중요하지 않다고 생각해야 합니다. 바로 그런 사람이 가장 큰사람입니다."
    scriptures: []
  - chapter: 87
    pid: 6
    num: 4
    text: |
      여러분은 내 친구입니다. 그래서 나는 아버지께서 알려 주라고 하신 것들을 모두 여러분에게 알려 줍니다. 조금 있으면 나는 하늘에 계신 아버지에게로 갈 것입니다. 여러분은 세상에 남겨질 것입니다. 여러분이 서로 사랑하면, 사람들은 여러분이 내 제자라는 걸 알게 될 것입니다. 내가 여러분을 사랑한 것처럼 여러분도 서로 사랑해야 합니다.
    scriptures: []
  - chapter: 87
    pid: 7
    num: 5
    text: |
      마지막으로, 예수께서는 여호와께 기도드리면서 제자들을 모두 보호해 달라고 요청하셨어요. 제자들이 평화롭게 함께 일할 수 있게 해 달라고도 하셨지요. 또 여호와의 이름이 거룩해지게 해 달라고 기도하셨어요. 이제 예수와 사도들은 여호와를 찬양하는 노래를 부르고 나서 밖으로 나갔어요. 예수께서 체포되실 시간이 점점 다가오고 있었지요.
    scriptures: []

