instructions_to_subresearchers:
  qa-designer: |
    # 중점
    CBS 30분 형식의 문답 블록 설계. 사회자 - 청중 1~2명 - 사회자 보강 사이클을 두 장 + 13부 소개에 대해 짠다.
    옛 docx 패턴 (260514 훈84-85·260507 훈82-83) 의 "(필수) 연구 질문 → 답변 단락 → 부가 해설 →
    삽화 질문 → 우리가 배우는 점 → 마지막 질문" 6단 구조 그대로.
    13부 소개는 별도 (필수) 연구 질문이 없으므로 90초 분량 짧은 도입·핵심 교훈 3개 회상 형식으로
    설계. 13부 전체 (87~106장) 의 큰 그림을 사회자가 직접 풀어 주는 방식.

    # 우선 범위
    1. 86장 핵심 질문 "나사로가 어떻게 부활되었는지 이야기해 보세요. 바리새인들은 나사로에 관한
       소식을 듣고 어떻게 하려고 했나요?"
       → 청중이 1~2 문장으로 대답할 수 있는 답변 bullets 4~5개 (본문 단락 1~5 에서 추출).
       → 사회자 보강 멘트 2~4문장 분량 (본문 재서술 금지, 적용·연결만).
       → 확장 질문 1개 (선택, 슬픔·부활 약속에 시선 고정).
       → 삽화 질문 1개 ("이 삽화는 죽은 자 가운데서 사람을 일으키시는 여호와의 능력에 대해 우리에게
         무엇을 가르쳐 줍니까?") 답변 1개.
       → 마지막 질문 ("참조 성구를 통해 무엇을 배우게 되었습니까? …여호와에 대해 무엇을 알려
         줍니까?") 답변 적용 (가정·회중·야외봉사 3축 짧게).

    2. 13부 소개 (90초 도입형)
       → 사회자가 직접 한 단락을 핵심 요약 (예수의 희생→부활→제자 사명).
       → 핵심 교훈 3개 ("여호와께서 해결하실 수 없는 문제란 없다" · "예수처럼 기꺼이 다른 사람들을
         섬기고 도와주어야 한다" · "참그리스도인들은 서로에게 나타내는 사랑으로 구별된다") 를
         인용한 후 짧은 한 줄 적용.

    3. 87장 핵심 질문 "예수께서는 사도들에게 어떤 약속을 하셨나요? 예수께서는 사도들과 마지막 저녁
       식사를 하면서 어떤 중요한 점들을 가르치셨나요?"
       → 동일 6단 구조 (86장 패턴 그대로).
       → 적용 3축에 "주의 만찬 — 매년 니산월 14일 기념" + "겸손과 서로 사랑" + "왕국 약속" 3 주제를
         반영.
       → 확장 질문 1개 (선택, 주의 만찬 참석 자세).

    # 피하기
    - 본문 verbatim 재서술 금지 (본문은 낭독자 담당)
    - 공식 연구 질문 verbatim 재서술 금지
    - "여러분도 …해 보신 적 있으십니까?" 류 상투적 청중 호명 금지 (9가지 표현 일체 금지)
    - 정치·국가·타 종교 교리 긍정 금지
    - 13부 소개를 86장·87장 처리와 같은 시간으로 길게 끌지 말 것 (90초 한도)

    # 출판 symbol 분리 의무
    ⚠ 회중 통칭 「훈」 = 실제 publication symbol `lfb` (1102016XXX)
    - 전면 표기: "「훈」 86장" 또는 "「내가 좋아하는 성경 이야기」 86장"
    - 「예수」 책 (jy 1102014XXX) 동일 일화 인용 시: "「예수」 책 90장" / "「예수」 책 121장" 명시
    - 두 책을 혼동·동일시 금지

  scripture-deep: |
    # 중점
    핵심 성구 2개 + 보강 성구 2개에 대해 신세계역 연구용 성서의 연구 노트·상호 참조·원어 정보 수집.

    # 필수 성구 목록
    1. **시편 68:20** (86장 핵심) — "참하느님은 우리에게 구원을 베푸시는 하느님. 주권자인 주
       여호와는 죽음에서 벗어나게 해 주시는 분."
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/19/68 연구 노트 전문 + 다윗의 시편으로서의 배경
         + "구원" 의 히브리어 원어 (예슈아) 의미 + "죽음에서 벗어나게 해 주시는" 의 깊은 의미
         + 상호 참조 (시 9:13, 히 5:7, 계 21:4 등) 수집.
    2. **누가복음 12:32** (87장 핵심) — "적은 무리여, 두려워하지 마십시오. 여러분의 아버지께서
       여러분에게 왕국을 주는 것을 승인하셨습니다."
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/42/12 연구 노트 전문 + "적은 무리" 의 헬라어 원어
         (믹론 포임니온) 의미 + 왕국 약속의 위로 + 마지막 저녁 식사 직후 맥락은 아님 (12장 전체
         흐름 안에서의 위치) — 단 87장의 위로 분위기와 연결되는 점 분석.
    3. **요한복음 11:25** (86장 보강, 선택) — 예수의 "나는 부활이며 생명입니다" 자기 선언.
       → wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/43/11 연구 노트 + "에고 에이미" 표현 (예수의 7대
         "나는 ~이다" 선언 중 하나) + 마르다와의 대화 맥락.
    4. **요한복음 13:34, 35** (87장 보강, 선택) — "새 계명을 여러분에게 줍니다… 사람들은 여러분이
       내 제자라는 것을 알게 될 것입니다."
       → 연구 노트 + "새" 의 헬라어 원어 (카이노스) 가 시간이 아닌 질의 새로움 의미 + 예수의
       사랑의 모범 측정 기준.

    # 우선 범위
    - 신세계역 연구용 성서 (nwtsty) 연구 노트 2026년 최신판 직접 fetch
    - 「통찰」 (it-1, it-2) 의 관련 인명·지명·용어:
      · "베다니" 항목 (마을 위치·예루살렘과의 거리 약 3km·감람산 동쪽 비탈)
      · "나사로" 항목 (예수의 친구·마리아·마르다의 형제·부활)
      · "유월절" 항목 (니산월 14일·이집트 출애굽 기념·마지막 만찬과의 연관)
      · "주의 만찬" 항목 (제정·연 1회·니산월 14일 후 일몰·빵·포도주의 의미)
    - 헬라어·히브리어 원어 의미 — 단 회중 청중에게 자연스럽게 전달 가능한 수준만

    # 피하기
    - 다른 장의 성구 끌어오지 말 것 (위 4개 + 본문 인용 성구만)
    - 학술적·신학적 추측 금지 (특히 "에고 에이미" 의 신학적 함의 같은 깊이는 적당 선에서)
    - 외국어판 (영문 nwtsty 연구판 제외) 인용 금지

    # 출판 symbol 분리 의무
    ⚠ 회중 통칭 「훈」 = 실제 `lfb` (1102016XXX) — 「예수」 책 (jy 1102014XXX) 와 별도 책.
    - 「예수」 책 90장 (나사로 부활 챕터) docid wol fetch 검증 후 제목·면 번호 정확 표기.
    - 「예수」 책 121장 (주의 만찬 제정 챕터) docid wol fetch 검증.
    - 횡단 인용 시 반드시 "「예수」 책 NN장" 형식, "「훈」" 와 혼용 금지.

  publication-cross-ref: |
    # 중점
    두 장 + 13부 소개의 핵심 키워드별로 「통찰」·「파」 연구용·「예수」 책·「하느님 사랑」·
    「깨어라!」 횡단 검색.

    # 우선 범위 (검색 키워드)
    1. **86장 키워드 (나사로 부활)**:
       - "베다니" 마을 위치·지형 → 「통찰」 제1권 "베다니" 항목 (URL·면 번호)
       - "부활" 교리 (예수의 부활 능력·마지막 날 부활 약속) → 「통찰」 제1권 "부활" 항목
       - "예수의 눈물" / "예수의 사랑" → 최근 10년 「파」 연구용 (2018~2025) — 예수의 인성
