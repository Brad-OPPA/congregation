        · 회중 안에서 사 65:25 의 평화를 일상에서 살아 낸 경험 (요점 3) — 적대 관계 화해, 다른 배경의 형제·자매가 한 식탁
        · 입원·투병 가운데 형제·자매의 동행 (요점 2 — 집교 삽화 ④ 와 매칭)
        · 감옥에서 영적 양식을 통해 인내 (요점 2 — 집교 삽화 ③ 와 매칭)

      출처 우선순위:
        · 「파수대」 연구용·배부용 2020-2024
        · 「깨어라!」 2020-2024
        · JW 방송 (jw.org/ko/library/videos)
        · 연감 (yearbook)

    중점 — 본 주차 메시지 핵심 적용 1~2개를 본문에 박고 (요점 2 우선), 나머지는 보강 자료로.
    피하기 — 실명 공개된 아동 / 정치적·국가적 색채 / 출처 불명 전승 / 진화론 사실 전제 / 비증인 권위 인용.

    산출 베이스라인: ≥ 5 경험담. 각 경험담에 출판물 호수·면·URL 4요소 명시.

    출력 형식: JSON 또는 .md (각 경험담 = 1 파일). _selfcheck.md 에 출처 verbatim 재조회 결과 기록.

  application-builder: |
    [공통 의무 1~8 위 참조]

    적용 카드 발굴 (≥ 4 베이스라인, 매 요점에 1개 이상):
      4축 (가정·직장/학교·회중·개인 영성) 골고루 분포.

      요점 1 (풍부한 영적 양식):
        · 가족 숭배 카드: 사 65:13 한 절 + 매주 누리는 영적 양식 한 가지 함께 꼽기
        · 개인 영성 카드: 일주일 영적 식탁 점검 — 어느 끼니가 비었는지 자문
      요점 2 (인내):
        · 회중 카드: 어려움 겪는 회중원에게 카드·짧은 안부 (집교 삽화 ④ 와 매칭)
        · 가정 카드: 가족 중 침체기인 사람에게 함께 집회 가자 권유
      요점 3 (평화):
        · 회중 카드: 거리감 있던 형제·자매에게 먼저 인사 한 마디
        · 직장/학교 카드: 적대적 동료·동급생에게 친절 한 번 — 사 65:25 일상 성취

    중점 — 매 요점에 1개 이상 적용 카드 + 청중 적용 단락 비율 R4 (3~11 단락). 자기점검 질문 1~2개 포함.
    피하기 — 정치·국가 관련 예시 / 사용자 NG 어휘 ("가정 경배"·"신자"(단독)·"여호와의 임재"·"수동적...") / 모호한 추상 권유 ("열심히 하십시오" 류).

    산출 베이스라인: ≥ 4 적용 카드 (4축 분포). 각 카드에 4축 라벨·실행 행동·자기점검 질문 명시. 하한 미달 시 ② 자체 검수 FAIL.

# ──────────────────────────────────────────────────────────────────────
# 자동 검증 룰 (R1~R18) 사전 안내 — script ④ 와 assembly ⑤ 가 자동 grep
# ──────────────────────────────────────────────────────────────────────
auto_validation_rules_summary:
  R1: "글자수 2,090 ~ 3,800 (목표 2,500~3,400)"
  R2: "출처 호명 ≤ 6 (정규식 「[^」]+」.*?(짚|정리|보여|알려|밝혀|말하|설명))"
  R3: "외부 14축 본문 침입 = 0 (HIGH 즉시 NG: 키루스·요세푸스·케년·BC·고고학·발굴·연대·왕조)"
  R4: "청중 적용 단락 3 ~ 11"
  R5_R6: "본문/예/적용 비율 50-70 / 8-25 / 19-40"
  R7: "타종교 키워드 = 0 (불교·이슬람·힌두·천주교·개신교·라마·부처)"
  R8: "6단계 narrative ≥ 4.5/6"
  R9: "시간 마커 ≥ 3 (본 기획 5개)"
  R10: "시간 마커 위치 — 서론 끝(~1'30") + 결론 직전(8'30"~9'30") 둘 다 박힘"
  R11: "각 요점에 6단계 슬롯 [hook/question/scripture/read/word_explain/bridge] 박힘"
  R12: "결론에 집교 본 주차 삽화 임베드 + 해설 (mwb26/2026/190)"
  R13: "결론에 서론 콜백 (서론 키워드 결론 매칭 — '식탁')"
  R14: "서론 5 흐름 (질문/흥미/주제/환기/안내) 5 슬롯 박힘"
  R15: "모범 정형 표현 3종 모두 박힘 — '함께 OO장 OO절에서 확인해 보겠습니다' / '바로 이어지는 OO장 OO절에서 그 답을 찾아볼 수 있습니다' / '삽화를 함께 보시겠습니다'"
  R16: "서론 ↔ 요점 비유 메시지 중복 X"
  R17: "결론 5 단락 — 리마인드/자문/콜백/호소/약속"
  R18: "WOL 미검증 표현 = 0 (의심 어휘는 WOL 최근 10년 fetch 검증 후만 사용)"

# 사용자 NG list (jw-style-checker 자동 grep)
user_ng_list:
  - {ng: "가정 경배", replace: "가족 숭배"}
  - {ng: "신자 (단독)", replace: "형제·자매 / 증인 / 전도인"}
  - {ng: "여호와의 임재 (명사형)", replace: "여호와의 영광 / 여호와께서 빛나시다 / 여호와께서 친히 빛나시는 것"}
  - {ng: "수동적 ...", replace: "받기만 하는 ... / 주저앉은 ..."}
