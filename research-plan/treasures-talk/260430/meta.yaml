    연결 목표: 각 경험이 3개 요점 중 어디에 삽입 가능한지 명시. 요점당 1~2 경험 후보.

  application-builder: |
    4축 적용 카드 발굴 — 요점 3개에 맞게:

    요점 1 적용 (우상→여호와 첫 의지):
      · 가정: 가족 문제 앞에서 "첫 반응이 기도인가, 검색인가?" 점검
      · 직장/학교: 성과 압박·경쟁 속 "성공 우상화" 경고 신호 리스트
      · 회중: 봉사 활동 통해 우선순위 재조정
      · 개인 영성: 아침 첫 5분 기도로 하루 시작

    요점 2 적용 (요동 → 평안):
      · 가정: 하루 10분 가족 성구 묵상 — 마음의 요동 진정
      · 직장/학교: 스마트폰 끄는 시간·정보 단식
      · 회중: 정기적 집회 참석으로 영적 안정 유지
      · 개인 영성: 일기 또는 기도 노트로 마음 상태 점검

    요점 3 적용 (평화 회복):
      · 가정: 가족과의 해결되지 않은 관계 회복 시도
      · 직장/학교: 양심에 걸리는 관행 식별·거리두기
      · 회중: 장로·신뢰하는 형제에게 상담 요청
      · 개인 영성: 양심 목록 작성·기도로 맡김

    자기점검 질문: 각 요점당 1~2개 (총 3~6개)
      예: "내가 위기 때 가장 먼저 도움을 청한 대상은 누구·무엇인가?"
      예: "요즘 내 마음은 잔잔한 호수인가, 요동치는 바다인가? 원인은?"
      예: "밤에 편히 잠들 수 없게 하는 것이 있는가?"

    우선 소재:
      - 「하느님의 사랑 안에 머무십시오」 관련 장
      - 「기쁜소식」 전도 안내 책
      - 「청소년」 질문 답하기 책 (젊은이 주제일 때)
      - wol 지정 4개 참조 출판물의 적용 부분

    저장 파일 (research-application/260430/):
      - 01_point1-idol-check.md       (우상 점검 카드)
      - 02_point2-still-heart.md      (마음 진정 카드)
      - 03_point3-peace-restore.md    (평화 회복 카드)
      - 04_self-questions.md          (자기점검 질문 묶음)
      - _selfcheck.md                 (🔴 블록)

    피할 것:
      - 정치·국가·법 관련 적용 예시
      - 실명 회중 인물
      - 의학적 조언 (불안 장애 치료 등은 의사 상담으로 안내)
      - 과도하게 개인적/사적 예시

    연결 목표: 각 카드가 원고 어느 지점에 삽입되어 "청중 행동 촉구" 로 기능할지 명시. 특히 결론의 "이번 주 실천 한 가지" 후보 1개는 반드시 강조.

