# 6단 방어(v2) ① 단계 — 5 보조 리서치 지시서
instructions_to_subresearchers:
  scripture-deep: |
    중점 — 예레미야 1:6, 1:8, 1:9 (3 표어 성구) + 1:7, 1:17-19 (보조).
    각 성구 신세계역 연구용 verbatim + 연구 노트 + 상호 참조 + 핵심 단어 원어
    (히브리어 "나아르"=아이/소년, "아니 잇트카"=내가 너와 함께 있다 등) 심층 조사.
    출처: https://wol.jw.org/ko/wol/b/r8/lp-ko/nwt/24/1
    (피하기: 다른 장 끌어오지 말 것. 본 주차 1-3장 범위 내.)
  publication-cross-ref: |
    중점 — 「파10」 1/15 9면 7-8항 (2010042) 정확한 본문 + 「통찰」 "예레미야" 항목 +
    「예레미야의 메시지를 통해 살아 있는 여호와에게 가까이」 (jr) 책 1장 관련 단락.
    검색 범위: 위 3개 우선. 추가로 「파」 연구용 2014-2024 중 "예레미야 두려움 자격" 관련 단락 2-3개.
    각 인용 docid + URL 명시.
    (피하기: 외국어판 인용·과거 너무 옛날 호 인용 X)
  illustration-finder: |
    요점 1 (두려움) — 일상 비유 2개 (예: 처음 학교 발표 / 새 직장 첫 출근 같은 이해 쉬운 그림)
    요점 2 (여호와의 약속) — 일상 비유 2개 (예: 부모가 아이의 손을 잡고 함께 걸어가는 모습 / 코치가 옆에서 함께 뛰는 모습)
    요점 3 (자격을 갖추게 하심) — 일상 비유 2개 (예: 베테랑이 신참에게 도구를 건네는 모습 / 부모가 아이에게 단어를 가르치는 모습)
    서론 후크 — 청중 직접 질문 후보 3-5개 (전도 활동에서 두려움을 느낀 적 있는가? 류).
    결론 삽화 — 본 주차 「집교」 표지 삽화 (예레미야가 예루살렘에서 거짓 숭배자들에게 여호와의 심판의 소식을 전함) 다운로드.
    (피하기: 회중 특정 인물 언급 / 외부 14축 본문 침입 X — 예 자리도 0건 권장)
  experience-collector: |
    중점 — 두려움을 이기고 전도한 형제·자매 경험담 1-2개.
    범위: jw.org / 「파수대」 연구용 2014-2024 / 연감.
    피하기: 실명 공개된 미성년자 / 사망자.
    (10분 연설은 경험담 강제 X — 1-2개 자연스러운 자리만 사용)
  application-builder: |
    중점 — 5축 (가정·직장/학교·회중·전도·개인 영성) 적용점 각 요점별 1-2개.
    특히 봉사·전도 두려움 극복 → 청중 일상 적용에 강조.
    자기점검 질문 1-2개 (결론 직전).
    (피하기: 정치/국가 관련 예시·강제적 결단 요구 X)

