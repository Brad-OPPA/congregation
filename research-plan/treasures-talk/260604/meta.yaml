# 본 주차 「집교」 본문 요지 (10분 연설 머릿말 — 그대로)
mwb_brief: |
  [동영상 「예레미야 소개」를 보여 준다.]
  예레미야처럼 일부 사람들은 좋은 소식을 전하고 싶어 하지만 두려움을 느끼거나
  자격이 없다고 생각합니다 (렘 1:6).
  여호와께서는 우리가 그분의 뜻을 행하도록 자격을 갖추게 해 주시고 힘을 주십니다
  (렘 1:8, 9; 「파10」 1/15 9면 7-8항; 표지 삽화 참조).

# 결론 삽화 — mwb 본 주차 표지 삽화 (예레미야가 예루살렘에서 거짓 숭배자들에게
# 여호와의 심판의 소식을 전하는 장면)
conclusion_illustration:
  caption: "본 주차 「집회 교재」 표지 삽화 — 예레미야가 예루살렘에서 거짓 숭배자들에게 여호와의 심판의 소식을 전함"
  source: "mwb 2026 6월호 표지"

# 3 요점 표어 성구 (직접 wol.jw.org 확인)
points:
  - no: 1
    title: "예레미야의 두려움 — ‘저는 아직 아이라서 말할 줄 모릅니다’"
    scripture_ref: "예레미야 1:6"
    scripture_text_nwt: "그러나 내가 말했다. “아, 주권자인 주 여호와여! 저는 아직 아이라서 말할 줄 모릅니다.”"
    pub_ref: "「파10」 1/15 9면 7항"
  - no: 2
    title: "여호와의 약속 — ‘두려워하지 마라. 내가 너와 함께 있다’"
    scripture_ref: "예레미야 1:8"
    scripture_text_nwt: "그들의 모습을 보고 두려워하지 마라. 내가 너와 함께 있어 너를 구해 줄 것이기 때문이다. 여호와의 말이다."
    pub_ref: "「파10」 1/15 9면 7항 (예레미야 1:8, 19; 15:20)"
  - no: 3
    title: "여호와께서 자격을 갖추게 하심 — ‘내가 나의 말을 너의 입에 넣어 주었다’"
    scripture_ref: "예레미야 1:9"
    scripture_text_nwt: "그러고 나서 여호와께서 손을 내밀어 나의 입에 대셨다. 여호와께서 말씀하셨다. “내가 나의 말을 너의 입에 넣어 주었다.”"
    pub_ref: "「파10」 1/15 9면 8항"

