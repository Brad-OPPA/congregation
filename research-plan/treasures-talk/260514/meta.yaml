    4축 적용 카드 발굴 — 요점 3개에 맞게:

    요점 1 적용 (영적 침체에서 일어남):
      · 가정: 가족 한 명이 영적으로 위축돼 있을 때 격려 한 마디·성구 인용
      · 직장/학교: 압박·경쟁 속에서 자신의 영적 자세 점검 — "나는 빛을 비추고 있는가, 어둠에 동화되고 있는가"
      · 회중: 회중 활동 위축된 형제·자매에게 동행 제안
      · 개인 영성: 매일 아침 5분 기도로 "오늘도 일어나서 빛을 비추겠습니다" 다짐

    요점 2 적용 (부분 → 더 큰 성취 시각):
      · 가정: 지금의 한계·아쉬움을 더 큰 성취의 약속으로 위로
      · 직장/학교: 일시적 보상 vs 영원한 보상 시각 유지
      · 회중: 회중의 작은 진전도 더 큰 성취의 일부임을 격려
      · 개인 영성: 일상의 어려움을 영원한 시각(롬 8:18) 으로 점검

    요점 3 적용 (위에 있는 예루살렘 자녀로서 빛 비추기):
      · 가정: 가족원에게 진리의 빛을 한 마디 — 식사 기도·성서 인용
      · 직장/학교: 비공식 증거 한 번 — 자연스런 대화 중 진리 한 가지
