    === 요점별 텍스트 예화 발굴 (이미지 임베드용 아님, 본문 묘사용) ===

    요점 1 "고대 예루살렘 상징" (2~3개):
      - ★★★ 14축 #6 고고학: BC 539년 키루스 원통 (Cyrus Cylinder, 대영박물관 ME 90920) — 바빌로니아 포로 해방 칙령 비문. 외부 사실 → 사 44·45 의 키루스 예언 1차 성취. 이사야 60장 회복 약속 직전 단계.
      - ★★ 14축 #7 지형: 폐허 → 재건된 예루살렘 (느헤미야 시대 성벽 복원, 고고학자 캐슬린 케년 발굴 결과) — 외부 사실로 "예언 그대로 일어났음" 입증.
      - ★ 14축 #8 문헌: 1세기 유대 역사가 요세푸스의 「유대 고대사」 가 키루스 칙령 본문 보존 — 성서 외부 자료가 성서 기록 일치 증언.

    요점 2 "부분 성취" (2~3개):
      - ★★★ 14축 #6 고고학·#8 문헌: 마카베오 시대(BC 2세기) 외성벽·헤롯 시대(BC 1세기) 안토니아 망루 — 재건된 예루살렘이 "성문이 늘 열려 있는" 평화의 도시는 결코 아니었음. 외부 역사 자료 (요세푸스 「유대 전쟁사」) 증언.
      - ★★ 14축 #11 시간·유한성: AD 70년 로마군에 의한 두 번째 멸망 — 1차 성취도 영구하지 않았음. 따라서 "더 큰 성취" 가 필연.
      - ★ 14축 #10 인생 의미: 지상의 어떤 도시도 사 60장의 빛을 다 담을 수 없음.

    요점 3 "위에 있는 예루살렘 — 더 큰 성취" (2~3개):
      - ★★★ 14축 #2 우주 구조: 별빛은 수백·수천 년 전 출발한 빛 — 도착에 시간 지연. 그러나 사 60:19 "여호와가 너에게 영원한 빛이 될 것이다" 는 시간 지연 없는 영원한 현재의 빛. 외부 천문 사실 → 성서 표현의 정확한 적중.
      - ★★ 14축 #10 인생 의미: 어머니·자녀 비유 — 청중 모두에게 친숙. 갈 4:26 "그가 우리의 어머니이다" 의 따뜻함.
      - ★ 14축 #13 선택의 무게: 어느 도시에 속해 있는가 — 지상 도시? 위에 있는 예루살렘?

    저장 파일 (research-illustration/260514/):
