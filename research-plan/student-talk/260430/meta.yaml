instructions_to_subresearchers:
  scripture-deep: |
    주 재료 「웹성대」 기사 90 이 인용한 핵심 성구 3개의 심층 조사:
      (A) 히브리서 10:24, 25 — 요점 1 낭독 성구
      (B) 야고보서 1:27 — 요점 2 낭독 성구
      (C) 욥기 16:5 — 조언과 「읽가」 16과 참조 성구

    각 성구에 대해 수집:
      1. 신세계역(개정판) 한국어 본문 verbatim — wol.jw.org/ko/wol/b/r8/lp-ko/nwtsty/... 에서 직접 복사
      2. 영문 NWT (2013 개정) verbatim
      3. 문맥: 앞뒤 2~3절 + 해당 장의 전체 흐름 요약
      4. 연구 노트·상호 참조 (wol 연구용 NWT 풋노트·크로스 레퍼런스)
      5. 원어 키워드 1~2개 원의:
         - 히 10:24 "분발시키다"(헬: paroxysmos/parozunō 계열)
         - 히 10:25 "권하고/격려하고"(헬: parakaleō)
         - 약 1:27 "순수한"·"세상으로부터 자기를 흠 없이 지키다"
         - 욥 16:5 "입술"과 "위로·힘"
      6. 각 성구를 5분 연설에서 낭독할 때 해설 1~2문장 (학생이 성구 읽고 바로 덧붙일 수 있는 짧은 설명)

    보조 성구 (각 1~2개만):
      - 요 13:34, 35 — 요점 1 보조 (사랑으로 식별)
      - 마 7:21 — 요점 2 보조 (주여 주여만으론 부족) — 문맥과 적용 한 줄

    ⛔ 피하기:
      - 본문 범위(기사 90) 밖으로 뻗어 나가 "종교"·"조직" 주제로 지나치게 확장 (통찰 항목 깊이는 publication-cross-ref 담당)
      - 신세계역 이외 번역으로 대체 인용
      - 원어 해설을 길게 풀어 학문 논문화 (5분 연설 소재로 소화 가능한 깊이까지만)

    저장: research-bible/260430/ — 성구별 md 파일 + _selfcheck.md

  publication-cross-ref: |
    주제 키워드 (다축):
      - "회중에 함께 모이는 것의 유익" · "상호 격려" · "히 10:24, 25 강해"
      - "참된 종교 vs 거짓 종교 구별" · "약 1:27"
      - "조직된 종교" · "여호와의 백성의 일치" (격려 톤 중심)

    우선 검색 범위:
      - 「파수대」 연구용 최근 10년 (2016~2026) — 특히 히 10:24, 25 · 약 1:27 강해 기사
      - 「통찰」("종교"·"회중"·"함께 모임" 항목)
      - 「즐거운 섬김」 책(회중의 유익 관련 장)
      - 「영원한 벗」 책(예수의 사랑의 명령 관련 장)
      - JW 방송 "아침 숭배" · "월간 방송" 최근 5년 중 관련 주제

    각 주제축에 3~5개 충분. 출처 4요소(출판물·호/면·URL·항) 필수.

    ⛔ 피하기:
      - 외국어판 인용 (한국어판 우선)
      - 다른 종교·종파를 구체 명시해 비판적으로 서술한 과거 자료 (「읽가」 16과 긍정 원칙에 상충)
      - 무관한 「파수대」 기사 (키워드만 일치)
      - 10년 이상 오래된 자료 (신학적으로 업데이트됐을 가능성)

    저장: research-topic/260430/ — 주제축별 md + _selfcheck.md

  illustration-finder: |
    서론 후크 (5분 연설 분량에 맞는 짧은 것):
      - 후보 2~3개 — "개인만으로 하느님을 믿으면 되지 않을까?" 식 질문·장면
      - 중립·동정적 톤 (타 종교 비판 금지)

    요점 1 ("함께 모이기의 유익") 예화 2~3개:
      - 숯불 예화 (모여 있으면 활활, 흩어지면 꺼짐) 같은 고전적이되 여전히 유효한 비유 — 출처 확인해서 제공
      - 운동팀·오케스트라·숲의 나무 등 "함께할 때의 시너지" 비유
      - 「파수대」·「깨어라」·JW 방송 실제 예화 우선

    요점 2 ("소속 이상의 실천") 예화 1~2개:
      - 가족에 "이름만 올려놓는 것" vs "함께 사는 것" 대비
      - 체육관 회원권 vs 실제 운동 — 같은 실천적 대비
      - 출처 있는 것 우선

    ⛔ 피하기:
      - 타 종교·종파·교회를 특정해 희화화·비판한 예화 (「읽가」 16과 소원칙 2 위반)
      - 회중 특정 인물 언급
      - 정치·국가·지역 예시
      - 최신 연예·정치 사건 예시

    저장: research-illustration/260430/ — 구간별 md + _selfcheck.md

  experience-collector: |
    수집 주제 2축:
      (가) 회중에 처음 참석/복귀했을 때 받은 **격려·환대·사랑**의 경험담
          → 요점 1 "함께 모이기의 유익" 뒷받침
      (나) 종교 이름만 있던 사람이 배운 진리를 **일상에 실천**해 변화된 경험
          → 요점 2 "실천이 따르는 믿음" 뒷받침

    출처:
      - 「연감」(있는 최근 판)
      - 「파수대」·「깨어라」 "경험담"·"인생 이야기" 섹션 2016~2026
      - JW 방송 "인터뷰" · "인생의 전환점" 유사 코너

    각 축 2~3개 충분. 5분 연설에는 1개를 20~30초 분량으로 압축 가능한 짧은 경험 선호.

    ⛔ 피하기:
      - 실명·특정 지역·식별 가능한 세부 노출
      - 미성년자 단독 경험
      - 타 종교·종파를 비판·조롱하는 어조의 경험담
      - 지나치게 극적이거나 선정적인 사례 (5분 연설에 맞지 않음)

    저장: research-experience/260430/ — 축별 md + _selfcheck.md

  application-builder: |
    적용 4축 (가정·직장/학교·회중·개인 영성) 중 이 연설은 **봉사·개인 영성** 축 포커스:

    요점 1 적용:
      - 봉사 구역에서 "종교는 개인적인 것" 식 반응에 대답하는 **격려형 예시 문장** 2개
        (예: "맞습니다, 신앙은 매우 개인적이죠. 동시에 성경은 함께 모일 때의 놀라운 유익도 말합니다…")
      - 회중 참석 자체를 다시 돌아보는 자기 점검 질문 1개

    요점 2 적용:
      - 자기 점검 질문 1~2개 (비판 아닌 권면 어조):
        예: "내가 배운 진리는 월요일 아침 직장에서도 눈에 보이는가?"
        예: "지난 한 주, 약 1:27 이 말하는 '고아·과부 돌봄' 에 내가 한 작은 행동은?"
      - 일상 실천 한 가지 구체 행동 (이번 주 실행 가능 수준)

    어조: 「읽가」 16과 소원칙 1·3 — **격려적·희망적**. "해야 한다" 보다 "할 수 있습니다" 프레이밍.

    ⛔ 피하기:
      - 정치·국가·민감 이슈 예시
      - 타 종교·종파를 구체적으로 지목한 대조 예시
      - 성취 경쟁 유발 톤 ("남들보다 더 많이" 식)
      - 5분 분량 초과할 정도의 긴 적용 리스트 (요점당 1~2개로 축약)

    저장: research-application/260430/ — 요점별 md + _selfcheck.md
