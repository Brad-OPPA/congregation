scripture_reads:
  - ref: "히 10:24, 25"
    read_aloud: true
    role: "요점 1 핵심 성구"
    nwt_ko: "서로 생각해 주어 사랑과 훌륭한 일을 고무하며, 일부 사람들의 습관처럼 함께 모이는 일을 그만두지 말고, 오히려 서로 격려하며 그날이 다가오는 것을 볼수록 더욱더 그렇게 합시다."
  - ref: "약 1:27"
    read_aloud: true
    role: "요점 2 핵심 성구"
    nwt_ko: "우리 하느님 아버지의 관점에서 깨끗하고 더럽혀지지 않은 숭배 방식은 고난을 겪는 고아와 과부를 돌보고 세상으로부터 자신을 지켜 점이 없는 상태를 유지하는 것입니다."
  - ref: "요 13:35"
    read_aloud: false
    role: "요점 1 요약 언급 (보조)"
    nwt_ko: "여러분 가운데 사랑이 있으면, 모든 사람이 그것으로 여러분이 내 제자라는 것을 알게 될 것입니다."
  - ref: "고전 16:19"
    read_aloud: false
    role: "요점 1 요약 언급 (보조)"
    nwt_ko: "아시아의 회중들이 여러분에게 안부를 전합니다. 아굴라와 브리스가가 자기 집에 모이는 회중과 함께 주 안에서 여러분에게 진심 어린 안부를 전합니다."
  - ref: "벧전 2:17"
    read_aloud: false
    role: "요점 1 요약 언급 (보조)"
    nwt_ko: "모든 부류의 사람들을 존중하고, 연합된 형제들 전체를 사랑하며, 하느님을 두려워하고, 왕을 공경하십시오."
  - ref: "욥 16:5"
    read_aloud: false
    role: "조언과 참조 성구 (사회자 ② 단계 인용)"
    nwt_ko: "하지만 나는 내 입의 말로 자네들을 강하게 해 주고, 내 입술의 위로로 고통을 덜어 주었을 걸세."

